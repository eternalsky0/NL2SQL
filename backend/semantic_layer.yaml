meta:
  domain: ride_hailing
  language: ru
  notes: "Реальная БД из train.csv. Один заказ (order_id) порождает несколько строк (tender_id)."

tables:
  orders:
    description: "Логи тендеров. Один заказ = несколько записей с разными tender_id."
    columns:
      city_id:                     "INTEGER — ID города"
      order_id:                    "TEXT — уникальный ID заказа"
      tender_id:                   "TEXT — ID тендера"
      user_id:                     "TEXT — ID пассажира"
      driver_id:                   "TEXT — ID водителя"
      offset_hours:                "INTEGER — смещение часового пояса"
      status_order:                "TEXT — статус заказа: done, cancel, accept, delete"
      status_tender:               "TEXT — статус тендера: done, decline, cancel, accept, wait"
      order_timestamp:             "TEXT — время создания заказа (ISO)"
      tender_timestamp:            "TEXT"
      driveraccept_timestamp:      "TEXT"
      driverarrived_timestamp:     "TEXT"
      driverstarttheride_timestamp: "TEXT"
      driverdone_timestamp:        "TEXT"
      clientcancel_timestamp:      "TEXT"
      drivercancel_timestamp:      "TEXT"
      order_modified_local:        "TEXT"
      cancel_before_accept_local:  "TEXT"
      distance_in_meters:          "INTEGER — дистанция в метрах"
      duration_in_seconds:         "INTEGER — длительность в секундах"
      price_order_local:           "REAL — цена заказа"
      price_tender_local:          "REAL — цена тендера"
      price_start_local:           "REAL — стартовая цена"

metrics:
  total_orders:
    canonical: "количество заказов"
    synonyms: ["заказы", "всего заказов", "уникальные заказы"]
    sql: "COUNT(DISTINCT order_id)"

  completed_orders:
    canonical: "завершённые поездки"
    synonyms: ["успешные заказы", "выполненные поездки", "done"]
    sql: "COUNT(DISTINCT CASE WHEN status_order = 'done' THEN order_id END)"

  cancelled_orders:
    canonical: "отмены"
    synonyms: ["отменённые заказы", "отмены заказов", "cancel"]
    sql: "COUNT(DISTINCT CASE WHEN status_order = 'cancel' THEN order_id END)"

  revenue:
    canonical: "выручка"
    synonyms: ["доход", "оборот", "сумма", "gmv"]
    sql: "SUM(CASE WHEN status_tender = 'done' THEN price_order_local ELSE 0 END)"

  avg_check:
    canonical: "средний чек"
    synonyms: ["средняя стоимость заказа"]
    sql: "AVG(CASE WHEN status_tender = 'done' THEN price_order_local END)"

  conversion_rate:
    canonical: "конверсия в поездку"
    synonyms: ["процент выполненных", "конверсия"]
    sql: "ROUND(COUNT(DISTINCT CASE WHEN status_order = 'done' THEN order_id END) * 100.0 / NULLIF(COUNT(DISTINCT order_id), 0), 2)"

  avg_distance_km:
    canonical: "средняя дистанция (км)"
    synonyms: ["среднее расстояние"]
    sql: "ROUND(AVG(CASE WHEN status_tender = 'done' THEN distance_in_meters END) / 1000.0, 2)"

  avg_duration_min:
    canonical: "среднее время в пути (мин)"
    synonyms: ["длительность поездки", "среднее время"]
    sql: "ROUND(AVG(CASE WHEN status_tender = 'done' THEN duration_in_seconds END) / 60.0, 1)"

  active_drivers:
    canonical: "активные водители"
    synonyms: ["количество водителей", "уникальные водители"]
    sql: "COUNT(DISTINCT CASE WHEN driver_id IS NOT NULL AND driver_id != '' THEN driver_id END)"

  active_users:
    canonical: "уникальные пассажиры"
    synonyms: ["клиенты", "пользователи"]
    sql: "COUNT(DISTINCT user_id)"

dimensions:
  date:
    canonical: "дата"
    synonyms: ["день", "по дням"]
    column: "DATE(order_timestamp)"
  hour:
    canonical: "час"
    synonyms: ["время суток", "по часам"]
    column: "CAST(strftime('%H', order_timestamp) AS INTEGER)"
  status_order:
    canonical: "статус заказа"
    column: "status_order"
  status_tender:
    canonical: "статус тендера"
    column: "status_tender"

rules:
  default_limit: 1000
  allowed_tables: ["orders"]