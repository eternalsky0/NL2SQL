meta:
  domain: ride_hailing
  language: ru
  notes: "Данные содержат логи тендеров. Один заказ может порождать несколько записей."

tables:
  orders:
    description: "Основная таблица поездок и предложений (тендеров)"
    columns:
      city_id: "ID города (всегда 67)"
      order_id: "Уникальный идентификатор заказа"
      tender_id: "Уникальный идентификатор конкретного предложения (тендера)"
      user_id: "ID пассажира"
      driver_id: "ID водителя"
      status_order: "Статус заказа (accept, cancel, delete, done)"
      status_tender: "Статус тендера (accept, decline, cancel, done, wait)"
      order_timestamp: "Время создания заказа"
      distance_in_meters: "Дистанция поездки в метрах"
      duration_in_seconds: "Длительность поездки в секундах"
      price_order_local: "Цена заказа для клиента"
      price_tender_local: "Цена, предложенная в тендере"

metrics:
  total_orders:
    canonical: "количество заказов"
    synonyms: ["заказы", "сколько заказов", "всего поездок"]
    sql: "COUNT(DISTINCT order_id)"

  completed_orders:
    canonical: "завершенные поездки"
    synonyms: ["успешные заказы", "выполненные поездки", "done"]
    sql: "COUNT(DISTINCT CASE WHEN status_order = 'done' THEN order_id END)"

  cancelled_orders:
    canonical: "отмены"
    synonyms: ["отмененные заказы", "сколько отменили", "cancel"]
    sql: "COUNT(DISTINCT CASE WHEN status_order = 'cancel' THEN order_id END)"

  revenue:
    canonical: "выручка"
    synonyms: ["доход", "оборот", "сумма продаж", "gmv"]
    sql: "SUM(CASE WHEN status_tender = 'done' THEN price_order_local ELSE 0 END)"

  avg_check:
    canonical: "средний чек"
    synonyms: ["средняя стоимость"]
    sql: "AVG(CASE WHEN status_tender = 'done' THEN price_order_local END)"

  conversion_rate:
    canonical: "конверсия в поездку"
    synonyms: ["процент выполненных"]
    sql: "CAST(COUNT(DISTINCT CASE WHEN status_order = 'done' THEN order_id END) AS REAL) / COUNT(DISTINCT order_id) * 100"

  avg_distance_km:
    canonical: "средняя дистанция (км)"
    synonyms: ["среднее расстояние"]
    sql: "AVG(CASE WHEN status_tender = 'done' THEN distance_in_meters END) / 1000.0"

  avg_duration_min:
    canonical: "среднее время в пути"
    synonyms: ["длительность поездки"]
    sql: "AVG(CASE WHEN status_tender = 'done' THEN duration_in_seconds END) / 60.0"

  active_drivers:
    canonical: "активные водители"
    synonyms: ["количество водителей", "кто на линии"]
    sql: "COUNT(DISTINCT driver_id) WHERE driver_id IS NOT NULL"

  active_users:
    canonical: "уникальные пассажиры"
    synonyms: ["клиенты", "пользователи"]
    sql: "COUNT(DISTINCT user_id)"

dimensions:
  date:
    canonical: "дата"
    synonyms: ["день", "по дням"]
    column: "DATE(order_timestamp)"
  hour:
    canonical: "час"
    synonyms: ["время суток"]
    column: "STRFTIME('%H', order_timestamp)"
  status:
    canonical: "статус"
    column: "status_order"
  city:
    canonical: "город"
    # Так как город один (67), просто возвращаем ID. 
    # В промпте объясним модели, что других городов нет.
    column: "city_id"

rules:
  default_limit: 1000
  allowed_tables: ["orders"]