<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drivee · Отчёты</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --brand-green: #96ea28;
      --brand-green-hover: #7ac517;
      --bg-main: #f5f6f8;
      --text-main: #1e1e1e;
      --text-muted: #8e8e93;
      --border-color: #ebebeb;
      --sidebar-width: 260px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    html, body, #root { height: 100vh; overflow: hidden; margin: 0; }
    body { background: var(--bg-main); color: var(--text-main); font-size: 14px; line-height: 1.5; }
    #root { display: flex; }
    .layout { display: flex; height: 100vh; width: 100%; }

    /* ── Sidebar ── */
    .sidebar { width: var(--sidebar-width); flex-shrink: 0; background: #fff; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 24px 12px; }
    .logo { padding: 0 12px; margin-bottom: 32px; cursor: pointer; }
    .logo img { height: 22px; display: block; }
    .btn-new-chat { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; background: var(--brand-green); border-radius: 16px; cursor: pointer; font-weight: 700; font-size: 14px; margin-bottom: 32px; transition: 0.2s; border: none; width: 100%; text-decoration: none; color: #000; }
    .btn-new-chat:hover { background: var(--brand-green-hover); transform: translateY(-1px); }
    .nav-menu { display: flex; flex-direction: column; gap: 4px; margin-bottom: 24px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 10px; cursor: pointer; color: var(--text-main); font-weight: 500; transition: 0.2s; font-size: 14px; text-decoration: none; }
    .nav-item:hover { background: #f5f5f7; }
    .nav-item.active { background: var(--brand-green); color: #000; }
    .nav-badge { margin-left: auto; background: var(--brand-green); color: #000; border-radius: 20px; font-size: 10px; font-weight: 800; padding: 1px 7px; }
    .icon-svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }

    /* Chat history in sidebar */
    .history-label { font-size: 11px; font-weight: 800; color: #ccc; padding: 0 16px 12px; letter-spacing: 1px; text-transform: uppercase; }
    .chat-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }
    .chat-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-radius: 12px; cursor: pointer; font-size: 13.5px; color: #555; transition: 0.2s; }
    .chat-item:hover { background: #f5f5f7; }
    .chat-item.active { background: #f0f0f2; color: #000; font-weight: 600; }
    .chat-item-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; }
    .btn-del-chat { opacity: 0; transition: 0.2s; padding: 4px; border-radius: 6px; background: none; border: none; cursor: pointer; color: inherit; }
    .chat-item:hover .btn-del-chat { opacity: 0.3; }
    .btn-del-chat:hover { opacity: 1 !important; color: #ef4444; }
    .user-profile { margin-top: auto; padding: 16px 12px 0; border-top: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; }
    .user-name { font-size: 13px; font-weight: 700; }
    .btn-logout { cursor: pointer; opacity: 0.4; font-size: 12px; font-weight: 600; }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; background: #fff; }
    
    /* ── Top bar with notifications ── */
    .top-bar { padding: 16px 40px; border-bottom: 1px solid var(--border-color); background: #fff; display: flex; align-items: center; justify-content: flex-end; gap: 16px; flex-shrink: 0; }
    .top-bar-notif { position: relative; cursor: pointer; padding: 8px 12px; border-radius: 12px; transition: 0.15s; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #888; border: 1px solid transparent; }
    .top-bar-notif:hover { background: #f5f5f7; color: #444; border-color: var(--border-color); }
    .top-bar-notif .badge { position: absolute; top: 2px; right: 2px; background: #ef4444; color: #fff; border-radius: 10px; font-size: 10px; font-weight: 800; padding: 1px 6px; min-width: 18px; text-align: center; }
    .top-bar-notif .badge.green { background: var(--brand-green); color: #000; }
    
    /* ── Notification dropdown ── */
    .notif-dropdown { position: absolute; top: calc(100% + 8px); right: 0; width: 420px; max-height: 480px; overflow-y: auto; background: #fff; border: 1px solid var(--border-color); border-radius: 20px; box-shadow: 0 16px 48px rgba(0,0,0,0.12); z-index: 500; animation: slideDown 0.15s ease; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .notif-dropdown-header { padding: 16px 20px 12px; font-size: 14px; font-weight: 700; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
    .notif-item { padding: 14px 20px; border-bottom: 1px solid #f5f5f7; cursor: pointer; transition: 0.1s; display: flex; align-items: flex-start; gap: 12px; }
    .notif-item:hover { background: #fafafa; }
    .notif-item.unread { background: #f9fef0; }
    .notif-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .notif-content { flex: 1; min-width: 0; }
    .notif-subject { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .notif-preview { font-size: 11.5px; color: #888; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .notif-time { font-size: 11px; color: #bbb; flex-shrink: 0; font-family: monospace; }
    .notif-empty { padding: 32px 20px; text-align: center; color: #ccc; font-size: 13px; }
    
    .content { flex: 1; overflow-y: auto; padding: 32px 40px; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: all 0.2s ease; white-space: nowrap; }
    .btn-green { background: var(--brand-green); color: #111; }
    .btn-green:hover:not(:disabled) { background: var(--brand-green-hover); transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: #666; border: 1px solid var(--border-color); }
    .btn-ghost:hover:not(:disabled) { color: var(--text-main); border-color: #ccc; background: #f9f9f9; transform: translateY(-1px); }
    .btn-danger { background: #fff5f5; color: #dc2626; border: 1px solid #fecaca; }
    .btn-danger:hover:not(:disabled) { background: #fee2e2; transform: translateY(-1px); }
    .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 10px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

    /* ── Action buttons for reports ── */
    .action-group { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    
    .btn-action {
      flex: 1;
      background: #1e1e1e;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
    }
    .btn-action:hover:not(:disabled) {
      background: #333;
      transform: translateY(-1px);
    }
    .btn-action:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .btn-icon {
      background: var(--bg-main);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 0 14px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      color: var(--text-main);
    }
    .btn-icon:hover {
      background: #e8e8ea;
      transform: translateY(-1px);
    }
    .btn-icon-danger {
      background: #fef2f2;
      border-color: #fecaca;
      color: #dc2626;
    }
    .btn-icon-danger:hover {
      background: #fee2e2;
      transform: translateY(-1px);
    }

    /* ── Page header ── */
    .page-header { margin-bottom: 28px; }
    .page-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .page-subtitle { font-size: 13px; color: var(--text-muted); }

    /* ── Report cards ── */
    .reports-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; align-items: start; max-width: 100%; }
    .report-card { background: #fff; border: 1px solid var(--border-color); border-radius: 20px; overflow: hidden; transition: 0.2s; display: flex; flex-direction: column; }
    .report-card:hover { border-color: #ccc; box-shadow: 0 6px 24px rgba(0,0,0,0.06); transform: translateY(-1px); }
    .report-card.inactive { opacity: 0.6; }
    .card-main { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
    
    .report-header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
    .report-icon-name { display: flex; gap: 12px; align-items: flex-start; flex: 1; min-width: 0; }
    .report-icon {
      width: 44px;
      height: 44px;
      background: #f9fef0;
      border: 1.5px solid #d9f99d;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #65a30d;
    }
    .report-icon svg {
      width: 22px;
      height: 22px;
      stroke: #65a30d;
    }
    .report-name { font-weight: 700; font-size: 14px; color: #1e1e1e; margin-bottom: 4px; }
    .report-question { font-size: 12.5px; color: #666; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    
    .report-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 12px; }
    .meta-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; background: var(--bg-main); color: #666; }

    /* ── Toggle ── */
    .toggle { position: relative; width: 38px; height: 22px; cursor: pointer; flex-shrink: 0; }
    .toggle input { position: absolute; opacity: 0; width: 0; height: 0; }
    .toggle-track { position: absolute; inset: 0; background: #e5e7eb; border-radius: 20px; transition: background 0.2s; }
    .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
    .toggle input:checked + .toggle-track { background: var(--brand-green); }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

    /* ── History footer ── */
    .card-foot { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-top: 1px solid var(--border-color); cursor: pointer; font-size: 12px; color: #aaa; user-select: none; transition: all 0.12s; }
    .card-foot:hover { color: #666; background: #fafafa; }
    .card-foot-arrow { font-size: 10px; transition: transform 0.15s; }
    .card-foot.open .card-foot-arrow { transform: rotate(90deg); }
    .foot-run-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* ── History panel ── */
    .history-panel { border-top: 1px solid var(--border-color); background: #fafafa; }
    .history-header { padding: 12px 20px 6px; font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: #ccc; }
    .history-empty { padding: 16px 20px; font-size: 13px; color: #ccc; }
    .run-row { display: flex; align-items: center; gap: 10px; padding: 10px 20px; border-top: 1px solid var(--border-color); font-size: 12.5px; }
    .run-row:hover { background: #f5f5f7; }
    .run-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .run-date { color: #888; font-family: monospace; font-size: 11.5px; flex-shrink: 0; }
    .run-trigger { padding: 1px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .trigger-manual   { background: #eff6ff; color: #2563eb; }
    .trigger-schedule { background: #f9fef0; color: #65a30d; }
    .trigger-api      { background: #faf5ff; color: #7c3aed; }
    .run-error-text { color: #dc2626; font-size: 11.5px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Empty ── */
    .empty { text-align: center; padding: 80px 20px; color: #ccc; }
    .empty h3 { font-size: 16px; color: #888; margin-bottom: 8px; }

    /* ── FAB ── */
    .fab { position: fixed; bottom: 28px; right: 28px; z-index: 100; }

    /* ── Modal ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.15s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .modal-box { background: #fff; border: 1px solid var(--border-color); border-radius: 28px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.18s ease; box-shadow: 0 32px 80px rgba(0,0,0,0.14); }
    .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 16px; border-bottom: 1px solid var(--border-color); }
    .modal-head h2 { font-size: 16px; font-weight: 700; }
    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    .modal-foot { padding: 16px 24px; border-top: 1px solid var(--border-color); display: flex; gap: 8px; justify-content: flex-end; }
    .close-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 8px; color: #888; cursor: pointer; font-size: 14px; transition: all 0.1s; }
    .close-btn:hover { color: var(--text-main); }

    /* ── Form ── */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.07em; }
    .field-row { display: flex; gap: 12px; }
    .field-row .field { flex: 1; }
    .field-hint { font-size: 11.5px; color: #aaa; }
    input[type=text], input[type=email], textarea, select {
      width: 100%; background: var(--bg-main); border: 1.5px solid var(--border-color);
      border-radius: 10px; color: var(--text-main); font-size: 13.5px; font-family: inherit;
      padding: 9px 12px; outline: none; transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--brand-green); background: #fff; }
    textarea { min-height: 80px; resize: vertical; font-family: monospace; font-size: 12px; line-height: 1.65; }
    select { cursor: pointer; }
    ::placeholder { color: #ccc; }

    .preset-wrap { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
    .preset-pill { padding: 3px 10px; border-radius: 20px; font-size: 11.5px; background: var(--bg-main); border: 1.5px solid var(--border-color); color: #888; cursor: pointer; transition: all 0.12s; }
    .preset-pill:hover { color: #65a30d; border-color: #d9f99d; transform: translateY(-1px); }
    .preset-pill.on { color: #65a30d; border-color: #d9f99d; background: #f9fef0; }
    .cron-ok  { font-size: 11.5px; color: #16a34a; font-family: monospace; }
    .cron-err { font-size: 11.5px; color: #dc2626; }

    .rcpt-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .rcpt-tag { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 20px; font-size: 12px; color: #666; }
    .rcpt-rm { cursor: pointer; color: #ccc; line-height: 1; font-size: 12px; }
    .rcpt-rm:hover { color: #dc2626; }

    /* ── Result modal ── */
    .result-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(6px); z-index: 1100; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.15s ease; }
    .result-modal { background: #fff; border: 1px solid var(--border-color); border-radius: 28px; width: 96%; max-width: 900px; max-height: 94vh; overflow: hidden; display: flex; flex-direction: column; animation: slideUp 0.2s ease; box-shadow: 0 32px 80px rgba(0,0,0,0.14); }
    .result-head { padding: 24px 28px 16px; border-bottom: 1px solid var(--border-color); display: flex; align-items: flex-start; gap: 16px; flex-shrink: 0; }
    .result-head-text { flex: 1; min-width: 0; }
    .result-head-text h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .result-head-text p { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 10px; }
    .run-meta { display: flex; flex-wrap: wrap; gap: 6px; }
    .run-meta-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 20px; font-size: 11.5px; background: var(--bg-main); border: 1px solid var(--border-color); color: #888; font-family: monospace; }
    .result-body { flex: 1; overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; }

    /* Stat cards */
    .stat-grid { display: grid; gap: 10px; }
    .stat-card { background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px 20px; }
    .stat-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #aaa; margin-bottom: 8px; }
    .stat-value { font-size: 26px; font-weight: 800; color: var(--text-main); line-height: 1; }
    .stat-value.accent { color: #16a34a; }
    .stat-sub { font-size: 12px; color: #aaa; margin-top: 4px; }

    /* KPI */
    .kpi-block { background: var(--bg-main); border: 1px solid var(--border-color); border-top: 3px solid var(--brand-green); border-radius: 14px; padding: 36px 24px; text-align: center; }
    .kpi-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 14px; }
    .kpi-value { font-size: 60px; font-weight: 800; color: var(--text-main); line-height: 1; }

    /* Chart */
    .chart-area { background: #fff; border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; height: 280px; position: relative; }
    .chart-title { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #aaa; margin-bottom: 14px; }

    /* Table */
    .section-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #aaa; margin-bottom: 8px; }
    .tbl-wrap { overflow-x: auto; border: 1px solid var(--border-color); border-radius: 12px; background: #fff; }
    .tbl-wrap table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .tbl-wrap th { padding: 10px 16px; text-align: left; background: var(--bg-main); color: #aaa; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border-color); white-space: nowrap; }
    .tbl-wrap td { padding: 9px 16px; border-bottom: 1px solid var(--bg-main); color: #555; font-family: monospace; font-size: 12.5px; white-space: nowrap; }
    .tbl-wrap td:first-child { color: var(--text-main); font-weight: 600; }
    .tbl-wrap tr:last-child td { border-bottom: none; }
    .tbl-wrap tr:hover td { background: #fafafa; }
    .tbl-footer { text-align: center; padding: 8px; font-size: 11.5px; color: #aaa; border-top: 1px solid var(--border-color); }

    /* SQL */
    .sql-toggle { cursor: pointer; font-size: 12px; color: #aaa; display: flex; align-items: center; gap: 6px; background: none; border: none; font-family: inherit; padding: 0; transition: color 0.2s; }
    .sql-toggle:hover { color: #666; }
    .sql-block { background: #f8f8fa; border: 1px solid var(--border-color); border-radius: 10px; padding: 14px 16px; font-family: monospace; font-size: 12px; color: #555; overflow-x: auto; white-space: pre; margin-top: 10px; line-height: 1.7; }

    /* ── Spinner ── */
    .spin { width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.08); border-top-color: currentColor; border-radius: 50%; animation: rot 0.65s linear infinite; flex-shrink: 0; display: inline-block; }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .toast-wrap { position: fixed; bottom: 22px; right: 22px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast { background: #fff; border: 1px solid var(--border-color); border-radius: 12px; padding: 11px 18px; font-size: 13px; color: var(--text-main); display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); animation: toastIn 0.2s ease; font-weight: 500; }
    .toast.ok  { border-left: 3px solid var(--brand-green); }
    .toast.err { border-left: 3px solid #dc2626; }
    @keyframes toastIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* ── Alerts modal ── */
    .alerts-modal { width: 100%; max-width: 720px; }
    .alert-card { background: #fff; border: 1px solid var(--border-color); border-radius: 16px; padding: 18px 20px; display: grid; grid-template-columns: 1fr auto; gap: 10px 20px; align-items: start; transition: border-color 0.15s; }
    .alert-card:hover { border-color: #d4d4d8; }
    .alert-card.inactive { opacity: 0.5; }
    .alert-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .alert-meta { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .alert-expr { font-family: monospace; font-size: 12px; background: #f9fef0; border: 1px solid #d9f99d; color: #65a30d; padding: 2px 8px; border-radius: 6px; }
    .alert-status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .alert-actions { display: flex; gap: 6px; align-items: center; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const API = "http://localhost:8000";

// ── Helpers ──────────────────────────────────────────────────────
const fmtNum = (v) => {
  if (v === null || v === undefined || v === "") return "—";
  const n = Number(v);
  if (!isNaN(n)) return Number.isInteger(n) ? n.toLocaleString("ru-RU") : n.toLocaleString("ru-RU", { maximumFractionDigits: 2 });
  return String(v);
};
const fmtDate = (d) => d ? new Date(d).toLocaleString("ru-RU", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }) : "—";
const fmtDur = (ms) => !ms ? null : ms < 1000 ? `${ms} мс` : `${(ms/1000).toFixed(1)} с`;
const TRIGGER_LABELS = { manual: "▶ Вручную", schedule: "⏱ Расписание", api: "🔌 API" };

// ── Icons ────────────────────────────────────────────────────────
const Icons = {
  Trash: () => <svg className="icon-svg" viewBox="0 0 24 24"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
};

// ── Cron humanizer ────────────────────────────────────────────────
const DOW_RU = { 0: ["Каждое","воскресенье"], 1: ["Каждый", "понедельник"], 2: ["Каждый","вторник"], 3: ["Каждую","среду"], 4: ["Каждый","четверг"], 5: ["Каждую","пятницу"], 6: ["Каждую","субботу"] };
function humanCron(expr) {
  if (!expr) return "";
  const p = expr.trim().split(/\s+/);
  if (p.length !== 5) return expr;
  const [min, hour, dom, month, dow] = p;
  if (!/^\d+$/.test(min) || !/^\d+$/.test(hour)) return expr;
  const t = `${hour.padStart(2,"0")}:${min.padStart(2,"0")}`;
  if (dom === "*" && month === "*") {
    if (dow === "*") return `Ежедневно в ${t}`;
    if (dow === "1-5") return `По будням в ${t}`;
    if (/^\d$/.test(dow) && DOW_RU[+dow]) return `${DOW_RU[+dow][0]} ${DOW_RU[+dow][1]} в ${t}`;
  }
  if (month === "*" && dow === "*" && /^\d+$/.test(dom)) return `${dom}-го числа каждого месяца в ${t}`;
  return expr;
}

// ── Toast ─────────────────────────────────────────────────────────
function useToast() {
  const [toasts, set] = useState([]);
  const add = (msg, type = "ok") => {
    const id = Date.now() + Math.random();
    set(t => [...t, { id, msg, type }]);
    setTimeout(() => set(t => t.filter(x => x.id !== id)), 3500);
  };
  return { toasts, toast: add };
}
function Toasts({ toasts }) {
  return (
    <div className="toast-wrap">
      {toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.type === "ok" ? "✓" : "✕"} {t.msg}</div>)}
    </div>
  );
}

// ── Chart ─────────────────────────────────────────────────────────
function ReportChart({ chartType, columns, rows }) {
  const ref = useRef(null);
  const inst = useRef(null);
  const type = chartType === "pie" ? "pie" : chartType === "line" ? "line" : "bar";
  useEffect(() => {
    if (!ref.current) return;
    if (inst.current) inst.current.destroy();
    const labels = rows.map(r => { const s = String(r[0]); return s.length > 20 ? s.slice(0,18)+"…" : s; });
    const values = rows.map(r => Number(r[1]) || 0);
    const PIE = ["#96ea28","#60a5fa","#fbbf24","#f87171","#a78bfa","#34d399","#fb923c","#38bdf8"];
    inst.current = new Chart(ref.current, {
      type,
      data: {
        labels,
        datasets: [{
          label: columns[1] || "Значение",
          data: values,
          backgroundColor: type === "pie" ? PIE : "#1e1e1e",
          hoverBackgroundColor: type === "pie" ? PIE : "#96ea28",
          borderColor: type === "line" ? "#96ea28" : "transparent",
          borderWidth: type === "line" ? 2.5 : 0,
          fill: type === "line" ? { target: "origin", above: "rgba(150,234,40,0.07)" } : false,
          tension: 0.4,
          pointBackgroundColor: "#96ea28",
          pointRadius: type === "line" ? 4 : 0,
          borderRadius: type === "bar" ? 6 : 0,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: { duration: 350 },
        plugins: { legend: { display: type === "pie", labels: { color: "#888", font: { size: 11 } } }, tooltip: { backgroundColor: "#fff", titleColor: "#111", bodyColor: "#888", borderColor: "#ebebeb", borderWidth: 1, padding: 10 } },
        scales: type === "pie" ? {} : {
          x: { ticks: { color: "#aaa", font: { size: 11 }, maxRotation: 35 }, grid: { display: false } },
          y: { ticks: { color: "#aaa", font: { size: 11 } }, grid: { color: "#f5f5f7" } }
        }
      }
    });
    return () => { if (inst.current) inst.current.destroy(); };
  }, [chartType, JSON.stringify(rows.slice(0,60))]);
  return <canvas ref={ref} />;
}

// ── Stat cards ────────────────────────────────────────────────────
function buildStats(columns, rows) {
  if (!rows.length || columns.length < 2) return [];
  let colIdx = -1;
  for (let i = 1; i < columns.length; i++) {
    if (!isNaN(Number(rows[0][i])) && rows[0][i] !== "") { colIdx = i; break; }
  }
  if (colIdx === -1) return [];
  const vals = rows.map(r => r[colIdx]).filter(v => v !== "" && !isNaN(Number(v))).map(Number);
  if (!vals.length) return [];
  const total = vals.reduce((a,b) => a+b, 0);
  const max = Math.max(...vals);
  const avg = total / vals.length;
  const maxRow = rows.find(r => Number(r[colIdx]) === max);
  if (rows.length === 1) return [{ label: columns[colIdx].replace(/_/g," "), value: fmtNum(vals[0]), accent: true }];
  return [
    { label: "Итого · " + columns[colIdx].replace(/_/g," "), value: fmtNum(total) },
    maxRow ? { label: "Лидер · " + columns[0].replace(/_/g," "), value: String(maxRow[0]), sub: fmtNum(max), accent: true } : null,
    { label: "Среднее · " + columns[colIdx].replace(/_/g," "), value: fmtNum(avg) },
  ].filter(Boolean).slice(0,3);
}

// ── Result modal ──────────────────────────────────────────────────
function ResultModal({ report, data, runMeta, onClose }) {
  const { columns, rows } = data;
  const chartType = report.chart_type || "bar";
  const stats = buildStats(columns, rows);
  const isKpi = columns.length === 1 && rows.length === 1;
  const hasNum = columns.length >= 2 && rows.length > 0 && !isNaN(Number(rows[0]?.[1]));
  const showChart = !isKpi && chartType !== "table" && hasNum && rows.length > 1;
  const [sqlOpen, setSqlOpen] = useState(false);
  const MAX = 100;
  return (
    <div className="result-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="result-modal">
        <div className="result-head">
          <div className="result-head-text">
            <h2>{report.name}</h2>
            <p>{report.question}</p>
            {runMeta && (
              <div className="run-meta">
                {runMeta.trigger && <span className="run-meta-chip">{TRIGGER_LABELS[runMeta.trigger] || runMeta.trigger}</span>}
                {runMeta.finished_at && <span className="run-meta-chip">{fmtDate(runMeta.finished_at)}</span>}
                {runMeta.row_count != null && <span className="run-meta-chip">{runMeta.row_count.toLocaleString("ru-RU")} строк</span>}
                {runMeta.duration_ms && <span className="run-meta-chip">{fmtDur(runMeta.duration_ms)}</span>}
              </div>
            )}
          </div>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>
        <div className="result-body">
          {isKpi && (
            <div className="kpi-block">
              <div className="kpi-label">{columns[0].replace(/_/g," ")}</div>
              <div className="kpi-value">{fmtNum(rows[0][0])}</div>
            </div>
          )}
          {!isKpi && stats.length > 0 && (
            <div className="stat-grid" style={{ gridTemplateColumns: `repeat(${stats.length}, 1fr)` }}>
              {stats.map((s,i) => (
                <div key={i} className="stat-card">
                  <div className="stat-label">{s.label}</div>
                  <div className={`stat-value ${s.accent ? "accent" : ""}`}>{s.value}</div>
                  {s.sub && <div className="stat-sub">{s.sub}</div>}
                </div>
              ))}
            </div>
          )}
          {showChart && (
            <div className="chart-area">
              <div className="chart-title">{columns[1]?.replace(/_/g," ")} по {columns[0]?.replace(/_/g," ")}</div>
              <ReportChart chartType={chartType} columns={columns} rows={rows.slice(0,60)} />
            </div>
          )}
          <div>
            <div className="section-label">Данные · {rows.length.toLocaleString("ru-RU")} строк{rows.length > MAX ? ` (показано ${MAX})` : ""}</div>
            <div className="tbl-wrap">
              <table>
                <thead><tr>{columns.map((c,i) => <th key={i}>{c.replace(/_/g," ")}</th>)}</tr></thead>
                <tbody>{rows.slice(0,MAX).map((row,i) => <tr key={i}>{row.map((v,j) => <td key={j}>{fmtNum(v)}</td>)}</tr>)}</tbody>
              </table>
              {rows.length > MAX && <div className="tbl-footer">Показано {MAX} из {rows.length.toLocaleString("ru-RU")} строк</div>}
            </div>
          </div>
          <div>
            <button className="sql-toggle" onClick={() => setSqlOpen(v => !v)}><span>{sqlOpen ? "▾" : "▸"}</span> SQL-запрос</button>
            {sqlOpen && <div className="sql-block">{report.sql}</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Cron validation hook ──────────────────────────────────────────
function useCron(expr, tz) {
  const [res, set] = useState(null);
  useEffect(() => {
    if (!expr) { set(null); return; }
    const t = setTimeout(async () => {
      try {
        const r = await fetch(`${API}/cron/validate`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ expr, tz }) });
        set(await r.json());
      } catch { set(null); }
    }, 400);
    return () => clearTimeout(t);
  }, [expr, tz]);
  return res;
}

// ── Report form ───────────────────────────────────────────────────
function ReportForm({ report, onClose, onSaved, toast }) {
  const isEdit = !!report?.id;
  const [name, setName] = useState(report?.name || "");
  const [question, setQuestion] = useState(report?.question || "");
  const [sql, setSql] = useState(report?.sql || "");
  const [chartType, setChartType] = useState(report?.chart_type || "bar");
  const [cron, setCron] = useState(report?.schedule_cron || "");
  const [tz, setTz] = useState(report?.timezone || "Europe/Moscow");
  const [rcptInput, setRcptInput] = useState("");
  const [rcpts, setRcpts] = useState(report?.recipients || []);
  const [presets, setPresets] = useState({});
  const [saving, setSaving] = useState(false);
  const [genning, setGenning] = useState(false);
  const cronRes = useCron(cron, tz);

  useEffect(() => { fetch(`${API}/cron/presets`).then(r => r.json()).then(setPresets).catch(() => {}); }, []);

  const genSql = async () => {
    if (!question.trim()) { toast("Введите вопрос", "err"); return; }
    setGenning(true);
    try {
      const r = await fetch(`${API}/query`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ question: question.trim(), username: "system" }) });
      const d = await r.json();
      if (d.error || !r.ok) { toast(d.message || d.detail || "Ошибка генерации", "err"); }
      else {
        const sqlVal = d.sql || d.data?.sql || "";
        setSql(sqlVal);
        if (d.chart_type) setChartType(d.chart_type);
        toast("SQL сгенерирован — проверьте перед сохранением");
      }
    } catch (e) { toast(e.message, "err"); }
    setGenning(false);
  };

  const addRcpt = () => { const v = rcptInput.trim(); if (v && !rcpts.includes(v)) setRcpts(r => [...r, v]); setRcptInput(""); };

  const save = async () => {
    if (!name || !question || !sql) { toast("Заполните Название, Вопрос и SQL", "err"); return; }
    setSaving(true);
    try {
      const url = isEdit ? `${API}/reports/${report.id}` : `${API}/reports`;
      const r = await fetch(url, {
        method: isEdit ? "PATCH" : "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, question, sql, chart_type: chartType, schedule_cron: cron || null, timezone: tz, recipients: rcpts })
      });
      if (!r.ok) throw new Error(await r.text());
      toast(isEdit ? "Отчёт обновлён" : "Отчёт создан");
      onSaved(await r.json());
    } catch (e) { toast(e.message, "err"); }
    setSaving(false);
  };

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box">
        <div className="modal-head">
          <h2>{isEdit ? "Редактировать отчёт" : "Новый отчёт"}</h2>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="field">
            <label>Название *</label>
            <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Еженедельный пульс городов" />
          </div>
          <div className="field">
            <label>Вопрос на русском *</label>
            <div style={{display:"flex",gap:8}}>
              <input type="text" value={question} onChange={e => setQuestion(e.target.value)} placeholder="Топ-10 водителей по поездкам за неделю" onKeyDown={e => e.key === "Enter" && genSql()} />
              <button className="btn btn-ghost btn-sm" onClick={genSql} disabled={genning || !question.trim()} style={{flex:'0 0 auto'}}>
                {genning ? <span className="spin" /> : "→ SQL"}
              </button>
            </div>
            <div className="field-hint">Напишите вопрос и нажмите «→ SQL»</div>
          </div>
          <div className="field">
            <label>SQL {!sql && "*"}</label>
            {genning
              ? <div style={{padding:"10px 12px",background:"var(--bg-main)",border:"1.5px solid var(--border-color)",borderRadius:10,fontSize:13,color:"#aaa",display:"flex",alignItems:"center",gap:8}}><span className="spin" /> Генерирую SQL…</div>
              : <textarea value={sql} onChange={e => setSql(e.target.value)} placeholder="Нажмите «→ SQL» или введите вручную" />
            }
            {sql && <div className="field-hint">Только SELECT · LIMIT добавляется автоматически</div>}
          </div>
          <div className="field-row">
            <div className="field">
              <label>График</label>
              <select value={chartType} onChange={e => setChartType(e.target.value)}>
                <option value="bar">Столбчатый</option>
                <option value="line">Линейный</option>
                <option value="pie">Круговой</option>
                <option value="table">Таблица</option>
              </select>
            </div>
            <div className="field">
              <label>Часовой пояс</label>
              <select value={tz} onChange={e => setTz(e.target.value)}>
                <option value="Europe/Moscow">Москва (UTC+3)</option>
                <option value="Europe/Kaliningrad">Калининград (UTC+2)</option>
                <option value="Asia/Yekaterinburg">Екатеринбург (UTC+5)</option>
                <option value="Asia/Novosibirsk">Новосибирск (UTC+7)</option>
                <option value="Asia/Vladivostok">Владивосток (UTC+10)</option>
                <option value="UTC">UTC</option>
              </select>
            </div>
          </div>
          <div className="field">
            <label>Расписание</label>
            <input type="text" value={cron} onChange={e => setCron(e.target.value)} placeholder="0 9 * * 1  — каждый понедельник в 9:00" style={{fontFamily:"monospace",fontSize:13}} />
            {cron && cronRes && (cronRes.ok ? <div className="cron-ok">✓ {cronRes.label}</div> : <div className="cron-err">✕ {cronRes.error}</div>)}
            <div className="preset-wrap">
              {Object.entries(presets).map(([k, p]) => (
                <span key={k} className={`preset-pill ${cron === p.cron ? "on" : ""}`} onClick={() => setCron(p.cron)}>{p.label}</span>
              ))}
            </div>
          </div>
          <div className="field">
            <label>Email-получатели (опционально)</label>
            <div style={{display:"flex",gap:8}}>
              <input type="email" value={rcptInput} onChange={e => setRcptInput(e.target.value)} onKeyDown={e => e.key === "Enter" && addRcpt()} placeholder="ops@company.com" />
              <button className="btn btn-ghost btn-sm" onClick={addRcpt} style={{flex:'0 0 auto'}}>+ Добавить</button>
            </div>
            {rcpts.length > 0 && (
              <div className="rcpt-list">
                {rcpts.map(r => (
                  <span key={r} className="rcpt-tag">{r} <span className="rcpt-rm" onClick={() => setRcpts(x => x.filter(v => v !== r))}>✕</span></span>
                ))}
              </div>
            )}
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onClose}>Отмена</button>
          <button className="btn btn-green" onClick={save} disabled={saving || genning}>
            {saving && <span className="spin" />}
            {isEdit ? "Сохранить" : "Создать отчёт"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Run row ───────────────────────────────────────────────────────
function RunRow({ run, report, onView }) {
  const [loading, setLoading] = useState(false);
  const ok = run.status === "success";
  const triggerClass = { manual: "trigger-manual", schedule: "trigger-schedule", api: "trigger-api" }[run.trigger] || "trigger-manual";
  const handleView = async () => {
    setLoading(true);
    try {
      const r = await fetch(`${API}/reports/${report.id}/runs/${run.id}`);
      const full = await r.json();
      const snap = full.data_snapshot;
      if (snap?.columns?.length) onView(report, snap, { trigger: run.trigger, finished_at: run.finished_at, duration_ms: run.duration_ms, row_count: run.row_count });
    } catch {}
    setLoading(false);
  };
  return (
    <div className="run-row">
      <div className="run-dot" style={{ background: ok ? "#16a34a" : "#dc2626" }} />
      <div className="run-date">{fmtDate(run.finished_at || run.started_at)}</div>
      <span className={`run-trigger ${triggerClass}`}>{TRIGGER_LABELS[run.trigger] || run.trigger}</span>
      {ok ? <span style={{color:"#aaa",fontSize:12}}>{run.row_count?.toLocaleString("ru-RU")} строк</span> : <span className="run-error-text">{run.error || "ошибка"}</span>}
      <span style={{color:"#ccc",fontFamily:"monospace",fontSize:11.5,marginLeft:4}}>{fmtDur(run.duration_ms)}</span>
      <span style={{flex:1}} />
      {ok && <button className="btn btn-ghost btn-sm" onClick={handleView} disabled={loading}>{loading ? <span className="spin" /> : "Открыть"}</button>}
    </div>
  );
}

// ── Notification dropdown ─────────────────────────────────────────
function NotificationDropdown({ type, open, onClose, items, onMarkRead, onOpenAlerts }) {
  if (!open) return null;
  
  const isInbox = type === 'inbox';
  const title = isInbox ? 'Входящие' : 'Алерты';
  const unreadItems = isInbox ? items.filter(i => !i.read_at) : items.filter(a => !a.enabled ? false : true);
  
  return (
    <div className="notif-dropdown" onClick={e => e.stopPropagation()}>
      <div className="notif-dropdown-header">
        <span>{title}</span>
        {isInbox && unreadItems.length > 0 && (
          <button 
            className="btn btn-ghost btn-sm"
            onClick={() => unreadItems.forEach(i => onMarkRead(i.id))}
          >
            Прочитать все
          </button>
        )}
        {!isInbox && (
          <button 
            className="btn btn-ghost btn-sm"
            onClick={() => { onClose(); onOpenAlerts(); }}
          >
            Управление
          </button>
        )}
      </div>
      {items.length === 0 ? (
        <div className="notif-empty">
          {isInbox ? 'Уведомлений пока нет' : 'Алертов пока нет'}
        </div>
      ) : (
        items.slice(0, 8).map(item => (
          <div 
            key={item.id} 
            className={`notif-item ${isInbox && !item.read_at ? 'unread' : ''}`}
            onClick={() => isInbox && !item.read_at && onMarkRead(item.id)}
          >
            <div className="notif-dot" style={{ 
              background: isInbox 
                ? (item.read_at ? '#ccc' : '#96ea28')
                : (item.last_triggered_at ? '#ef4444' : item.last_checked_at ? '#16a34a' : '#d4d4d8')
            }} />
            <div className="notif-content">
              <div className="notif-subject">{item.subject || item.name || item.report_name}</div>
              <div className="notif-preview">{item.preview || (item.operator && `значение ${item.operator} ${item.threshold}`) || '—'}</div>
            </div>
            <div className="notif-time">{fmtDate(item.created_at || item.last_checked_at)}</div>
          </div>
        ))
      )}
    </div>
  );
}

// ── Alerts modal ──────────────────────────────────────────────────
const OPERATORS = [
  { value: '<',  label: 'меньше' },
  { value: '>',  label: 'больше' },
  { value: '<=', label: '≤' },
  { value: '>=', label: '≥' },
  { value: '=',  label: 'равно' },
];

function AlertForm({ reports, onClose, onSaved, toast }) {
  const [name, setName]         = useState('');
  const [reportId, setReportId] = useState(reports[0]?.id || '');
  const [operator, setOperator] = useState('<');
  const [threshold, setThreshold] = useState('');
  const [rcptInput, setRcptInput] = useState('');
  const [rcpts, setRcpts]       = useState([]);
  const [saving, setSaving]     = useState(false);

  const addRcpt = () => {
    const v = rcptInput.trim();
    if (v && !rcpts.includes(v)) setRcpts(r => [...r, v]);
    setRcptInput('');
  };

  const save = async () => {
    if (!name || !reportId || threshold === '') { toast('Заполните все обязательные поля', 'err'); return; }
    setSaving(true);
    try {
      const r = await fetch(`${API}/alerts`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, report_id: Number(reportId), operator, threshold: Number(threshold), recipients: rcpts }),
      });
      if (!r.ok) throw new Error(await r.text());
      toast('Алерт создан');
      onSaved(await r.json());
    } catch (e) { toast(e.message, 'err'); }
    setSaving(false);
  };

  const rep = reports.find(r => r.id === Number(reportId));

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box">
        <div className="modal-head">
          <h2>Новый алерт</h2>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="field">
            <label>Название *</label>
            <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Выручка упала" autoFocus />
          </div>
          <div className="field">
            <label>Отчёт для проверки *</label>
            <select value={reportId} onChange={e => setReportId(e.target.value)}>
              {reports.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
            </select>
            {rep && <div className="field-hint">{rep.question}</div>}
          </div>
          <div className="field">
            <label>Условие срабатывания *</label>
            <div style={{display:'flex', gap:8, alignItems:'center'}}>
              <span style={{fontSize:13,color:'#888',flexShrink:0}}>Первое значение</span>
              <select value={operator} onChange={e => setOperator(e.target.value)} style={{width:'auto',flex:'0 0 auto'}}>
                {OPERATORS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
              <input type="number" value={threshold} onChange={e => setThreshold(e.target.value)} placeholder="1000" style={{flex:1}} />
            </div>
            {threshold !== '' && <div className="field-hint" style={{color:'#65a30d'}}>Сработает если: значение {operator} {threshold}</div>}
          </div>
          <div className="field">
            <label>Email-получатели <span style={{fontWeight:400,textTransform:'none',letterSpacing:0}}>(необязательно)</span></label>
            <div style={{display:'flex',gap:8}}>
              <input type="email" value={rcptInput} onChange={e => setRcptInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && addRcpt()} placeholder="ops@company.com" />
              <button className="btn btn-ghost btn-sm" onClick={addRcpt} style={{flex:'0 0 auto'}}>+ Добавить</button>
            </div>
            {rcpts.length > 0 && (
              <div className="rcpt-list">
                {rcpts.map(r => <span key={r} className="rcpt-tag">{r} <span className="rcpt-rm" onClick={() => setRcpts(x => x.filter(v => v !== r))}>✕</span></span>)}
              </div>
            )}
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onClose}>Отмена</button>
          <button className="btn btn-green" onClick={save} disabled={saving}>
            {saving && <span className="spin" />} Создать алерт
          </button>
        </div>
      </div>
    </div>
  );
}

function AlertsModal({ open, alerts, reports, onClose, onRefresh, toast }) {
  const [showForm, setShowForm] = useState(false);
  
  if (!open) return null;

  const toggle = async (alert) => {
    try {
      const updated = await fetch(`${API}/alerts/${alert.id}`, {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ enabled: !alert.enabled }),
      }).then(r => r.json());
      onRefresh();
      toast(alert.enabled ? 'Алерт выключен' : 'Алерт включен');
    } catch (e) { toast(e.message, 'err'); }
  };

  const del = async (alert) => {
    if (!confirm(`Удалить алерт «${alert.name}»?`)) return;
    await fetch(`${API}/alerts/${alert.id}`, { method: 'DELETE' });
    onRefresh();
    toast('Алерт удалён');
  };

  const getReport = (id) => reports.find(r => r.id === id);

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box alerts-modal">
        <div className="modal-head">
          <h2>Алерты</h2>
          <div style={{display:'flex', gap:8}}>
            <button className="btn btn-green btn-sm" onClick={() => setShowForm(true)} disabled={reports.length === 0}>+ Новый</button>
            <button className="close-btn" onClick={onClose}>✕</button>
          </div>
        </div>
        <div className="modal-body">
          {alerts.length === 0 ? (
            <div className="empty" style={{padding: '40px 20px'}}>
              <h3>Алертов пока нет</h3>
              <p style={{fontSize:13}}>Создайте первый — он проверяется каждые 15 минут</p>
            </div>
          ) : (
            alerts.map(alert => {
              const rep = getReport(alert.report_id);
              const triggered = alert.last_triggered_at;
              return (
                <div key={alert.id} className={`alert-card ${!alert.enabled ? 'inactive' : ''}`}>
                  <div>
                    <div className="alert-name">{alert.name}</div>
                    <div className="alert-meta">
                      {rep && <span>{rep.name}</span>}
                      <span className="alert-expr">значение {alert.operator} {alert.threshold}</span>
                      {alert.last_value != null && <span style={{color:'#aaa'}}>последнее: {alert.last_value}</span>}
                      {triggered
                        ? <><span className="alert-status-dot" style={{background:'#ef4444'}} />  сработал {fmtDate(triggered)}</>
                        : alert.last_checked_at
                          ? <><span className="alert-status-dot" style={{background:'#16a34a'}} /> в норме</>
                          : <><span className="alert-status-dot" style={{background:'#d4d4d8'}} /> не проверялся</>
                      }
                    </div>
                  </div>
                  <div className="alert-actions">
                    <label className="toggle" onClick={e => e.stopPropagation()}>
                      <input type="checkbox" checked={!!alert.enabled} onChange={() => toggle(alert)} />
                      <div className="toggle-track" /><div className="toggle-thumb" />
                    </label>
                    <button className="btn btn-danger btn-sm" onClick={() => del(alert)}>✕</button>
                  </div>
                </div>
              );
            })
          )}
        </div>
      </div>
      {showForm && reports.length > 0 && (
        <AlertForm reports={reports} onClose={() => setShowForm(false)} onSaved={(a) => { onRefresh(); setShowForm(false); }} toast={toast} />
      )}
    </div>
  );
}

// ── Reports main content ──────────────────────────────────────────
function ReportsTab({ toast }) {
  const [reports, setReports] = useState([]);
  const [loading, setLoading] = useState(true);
  const [formReport, setFormReport] = useState(undefined);
  const [resultData, setResultData] = useState(null);
  const [running, setRunning] = useState(null);
  const [expandedId, setExpandedId] = useState(null);
  const [runsCache, setRunsCache] = useState({});
  const [runsLoading, setRunsLoading] = useState(new Set());

  const load = async () => {
    setLoading(true);
    try { setReports(await fetch(`${API}/reports`).then(r => r.json())); } catch {}
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const toggleHistory = async (id) => {
    if (expandedId === id) { setExpandedId(null); return; }
    setExpandedId(id);
    if (!runsCache[id]) {
      setRunsLoading(s => new Set(s).add(id));
      try {
        const runs = await fetch(`${API}/reports/${id}/runs`).then(r => r.json());
        setRunsCache(c => ({ ...c, [id]: runs }));
      } catch {}
      setRunsLoading(s => { const ns = new Set(s); ns.delete(id); return ns; });
    }
  };

  const runReport = async (report, e) => {
    e.stopPropagation();
    if (running === report.id) return;
    setRunning(report.id);
    try {
      const r = await fetch(`${API}/reports/${report.id}/run`, { method: "POST" });
      const d = await r.json();
      if (d.status === "success") {
        toast(`Готово · ${d.row_count} строк`);
        setRunsCache(c => { const nc = {...c}; delete nc[report.id]; return nc; });
        load();
        if (d.data?.columns?.length) {
          setResultData({ report, data: d.data, runMeta: { trigger: "manual", finished_at: new Date().toISOString(), row_count: d.row_count } });
          if (expandedId === report.id) {
            setRunsLoading(s => new Set(s).add(report.id));
            try {
              const runs = await fetch(`${API}/reports/${report.id}/runs`).then(r => r.json());
              setRunsCache(c => ({ ...c, [report.id]: runs }));
            } catch {}
            setRunsLoading(s => { const ns = new Set(s); ns.delete(report.id); return ns; });
          }
        }
      } else toast(d.error || "Ошибка выполнения", "err");
    } catch (e) { toast(e.message, "err"); }
    setRunning(null);
  };

  const toggleEnabled = async (report, e) => {
    e.stopPropagation();
    try {
      const updated = await fetch(`${API}/reports/${report.id}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ enabled: !report.enabled }) }).then(r => r.json());
      setReports(rs => rs.map(r => r.id === updated.id ? updated : r));
    } catch (e) { toast(e.message, "err"); }
  };

  const deleteReport = async (report) => {
    if (!confirm(`Удалить отчёт «${report.name}»?`)) return;
    try {
      await fetch(`${API}/reports/${report.id}`, { method: "DELETE" });
      setReports(rs => rs.filter(r => r.id !== report.id));
      if (expandedId === report.id) setExpandedId(null);
      toast("Отчёт удалён");
    } catch (e) { toast(e.message, "err"); }
  };

  const getChartIcon = (type) => {
    switch(type) {
      case 'bar':
        return (
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <rect x="4" y="14" width="4" height="6" rx="0.5"/>
            <rect x="10" y="10" width="4" height="10" rx="0.5"/>
            <rect x="16" y="6" width="4" height="14" rx="0.5"/>
          </svg>
        );
      case 'line':
        return (
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <polyline points="4 18 8 12 12 15 16 8 20 11"/>
            <path d="M4 18h16"/>
          </svg>
        );
      case 'pie':
        return (
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2v10l8.66 5"/>
            <path d="M12 2a10 10 0 0 1 8.66 5"/>
          </svg>
        );
      default:
        return (
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="3" y1="15" x2="21" y2="15"/>
            <line x1="9" y1="9" x2="9" y2="21"/>
            <line x1="15" y1="9" x2="15" y2="21"/>
          </svg>
        );
    }
  };

  const getStatusColor = (status) => {
    if (status === 'success') return '#16a34a';
    if (status === 'error') return '#dc2626';
    return '#d4d4d8';
  };

  if (loading) return (
    <>
      <div className="page-header">
        <div className="page-title">Отчёты</div>
        <div className="page-subtitle">Автоматические запросы с расписанием и доставкой на почту</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,color:"#aaa",padding:"60px 0"}}><span className="spin" style={{color:"#aaa"}} /> Загрузка…</div>
    </>
  );

  return (
    <>
      <div className="page-header">
        <div className="page-title">Отчёты</div>
        <div className="page-subtitle">Автоматические запросы с расписанием и доставкой на почту</div>
      </div>
      {reports.length === 0 ? (
        <div className="empty"><h3>Отчётов пока нет</h3><p style={{fontSize:13}}>Создайте первый — напишите вопрос, SQL сгенерируется автоматически</p></div>
      ) : (
        <div className="reports-grid">
          {reports.map(r => {
            const isExpanded = expandedId === r.id;
            const runs = runsCache[r.id];
            const isRunsLoading = runsLoading.has(r.id);
            return (
              <div key={r.id} className={`report-card ${!r.enabled ? "inactive" : ""}`}>
                <div className="card-main">
                  <div className="report-header-row">
                    <div className="report-icon-name">
                      <div className="report-icon">
                        {getChartIcon(r.chart_type)}
                      </div>
                      <div>
                        <div className="report-name">{r.name}</div>
                        <div className="report-question">{r.question}</div>
                      </div>
                    </div>
                    <div className="report-actions">
                      <label className="toggle" onClick={e => e.stopPropagation()}>
                        <input type="checkbox" checked={!!r.enabled} onChange={e => toggleEnabled(r, e)} />
                        <div className="toggle-track" />
                        <div className="toggle-thumb" />
                      </label>
                    </div>
                  </div>
                  
                  <div className="report-meta">
                    {r.schedule_cron && (
                      <span className="meta-chip">
                        ⏱ {humanCron(r.schedule_cron)}
                      </span>
                    )}
                    {r.next_run_at && r.enabled && (
                      <span className="meta-chip" style={{background:'#eff6ff', color:'#2563eb'}}>
                        → {new Date(r.next_run_at).toLocaleString("ru-RU", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })}
                      </span>
                    )}
                    {r.last_status && (
                      <span className="meta-chip" style={{background: r.last_status === "success" ? '#f0fdf4' : '#fef2f2', color: r.last_status === "success" ? '#16a34a' : '#dc2626'}}>
                        {r.last_status === "success" ? "✓" : "✕"} {r.last_status === "success" ? "успешно" : "ошибка"}
                      </span>
                    )}
                    {!r.enabled && (
                      <span className="meta-chip" style={{background:'#f5f5f7', color:'#aaa'}}>
                        ⨯ выключен
                      </span>
                    )}
                  </div>

                  <div className="action-group" style={{display:'flex', gap: 8, marginTop: 8}}>
                    <button 
                      className="btn-action" 
                      onClick={e => runReport(r, e)} 
                      disabled={running === r.id}
                    >
                      {running === r.id ? (
                        <><span className="spin" /> Запуск…</>
                      ) : (
                        <>
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                          Запустить
                        </>
                      )}
                    </button>
                    
                    <button 
                      className="btn-icon" 
                      onClick={e => { e.stopPropagation(); toggleEnabled(r, e); }}
                      title={r.enabled ? "Приостановить" : "Возобновить"}
                    >
                      {r.enabled ? (
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                      ) : (
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                      )}
                    </button>

                    <button 
                      className="btn-icon" 
                      onClick={e => { e.stopPropagation(); setFormReport(r); }}
                      title="Редактировать"
                    >
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 3l4 4-7 7H10v-4l7-7z"/><path d="M4 20h16"/></svg>
                    </button>
                    
                    <button 
                      className="btn-icon btn-icon-danger" 
                      onClick={e => { e.stopPropagation(); deleteReport(r); }}
                      title="Удалить"
                    >
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                  </div>
                </div>

                <div className={`card-foot ${isExpanded ? "open" : ""}`} onClick={() => toggleHistory(r.id)}>
                  <span className="card-foot-arrow">▶</span>
                  {r.last_run_at ? (
                    <>
                      <div className="foot-run-dot" style={{ background: getStatusColor(r.last_status) }} />
                      <span>Последний: {new Date(r.last_run_at).toLocaleString("ru-RU", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })}</span>
                    </>
                  ) : <span>Ещё не запускался</span>}
                  <span style={{marginLeft:"auto",fontSize:11,color:"#ccc"}}>{isExpanded ? "Скрыть" : "История"}</span>
                </div>

                {isExpanded && (
                  <div className="history-panel">
                    <div className="history-header">История запусков</div>
                    {isRunsLoading ? (
                      <div className="history-empty" style={{display:"flex",alignItems:"center",gap:8}}><span className="spin" style={{color:"#ccc"}} /> Загрузка…</div>
                    ) : !runs?.length ? (
                      <div className="history-empty">Запусков ещё не было</div>
                    ) : (
                      runs.map(run => (
                        <RunRow key={run.id} run={run} report={r} onView={(rep, data, meta) => setResultData({ report: rep, data, runMeta: meta })} />
                      ))
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      <div className="fab">
        <button className="btn-new-chat" onClick={() => setFormReport(null)} style={{background:'var(--brand-green)', border:'none', borderRadius:16, padding:'14px 24px', fontSize:14, fontWeight:700, cursor:'pointer', display:'flex', alignItems:'center', gap:8, boxShadow:'0 8px 24px rgba(150,234,40,0.3)'}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14"/></svg>
          Новый отчёт
        </button>
      </div>

      {formReport !== undefined && (
        <ReportForm report={formReport} onClose={() => setFormReport(undefined)} onSaved={() => { load(); setFormReport(undefined); }} toast={toast} />
      )}
      {resultData && (
        <ResultModal report={resultData.report} data={resultData.data} runMeta={resultData.runMeta} onClose={() => setResultData(null)} />
      )}
    </>
  );
}

// ── Top bar ───────────────────────────────────────────────────────
function TopBar({ unreadInbox, unreadAlerts, inboxItems, alertItems, onMarkRead, onOpenAlerts }) {
  const [openDropdown, setOpenDropdown] = useState(null); // 'inbox' | 'alerts' | null
  
  useEffect(() => {
    if (!openDropdown) return;
    const close = (e) => {
      if (!e.target.closest('.top-bar-notif') && !e.target.closest('.notif-dropdown')) {
        setOpenDropdown(null);
      }
    };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, [openDropdown]);

  return (
    <div className="top-bar">
      <div className="top-bar-notif" onClick={() => setOpenDropdown(openDropdown === 'inbox' ? null : 'inbox')}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <path d="M22 12h-6l-2 3h-4l-2-3H2"/>
          <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
        </svg>
        Входящие
        {unreadInbox > 0 && <span className="badge">{unreadInbox}</span>}
        <NotificationDropdown 
          type="inbox" 
          open={openDropdown === 'inbox'} 
          onClose={() => setOpenDropdown(null)} 
          items={inboxItems} 
          onMarkRead={onMarkRead}
          onOpenAlerts={onOpenAlerts}
        />
      </div>

      <div className="top-bar-notif" onClick={() => setOpenDropdown(openDropdown === 'alerts' ? null : 'alerts')}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        Алерты
        {unreadAlerts > 0 && <span className="badge green">{unreadAlerts}</span>}
        <NotificationDropdown 
          type="alerts" 
          open={openDropdown === 'alerts'} 
          onClose={() => setOpenDropdown(null)} 
          items={alertItems} 
          onMarkRead={onMarkRead}
          onOpenAlerts={onOpenAlerts}
        />
      </div>

      <div className="top-bar-notif" onClick={onOpenAlerts}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Настроить
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────
function App() {
  const { toasts, toast } = useToast();
  const [chats, setChats] = useState([]);
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem('user')); } catch { return null; }
  });
  const [inboxItems, setInboxItems] = useState([]);
  const [alertItems, setAlertItems] = useState([]);
  const [reports, setReports] = useState([]);
  const [showAlertsModal, setShowAlertsModal] = useState(false);

  useEffect(() => {
    if (user) {
      loadChats();
      loadInbox();
      loadAlerts();
      loadReports();
    }
  }, [user]);

  const loadChats = async () => {
    try {
      const res = await fetch(`${API}/chats/${user.username}`);
      setChats(await res.json());
    } catch {}
  };

  const loadInbox = async () => {
    try {
      const res = await fetch(`${API}/inbox`);
      setInboxItems(await res.json());
    } catch {}
  };

  const loadAlerts = async () => {
    try {
      const res = await fetch(`${API}/alerts`);
      setAlertItems(await res.json());
    } catch {}
  };

  const loadReports = async () => {
    try {
      setReports(await fetch(`${API}/reports`).then(r => r.json()));
    } catch {}
  };

  useEffect(() => {
    if (!user) return;
    const t = setInterval(() => {
      loadInbox();
      loadAlerts();
    }, 15000);
    return () => clearInterval(t);
  }, [user]);

  const handleLogout = () => {
    localStorage.clear();
    window.location.href = 'index.html';
  };

  const markInboxRead = async (id) => {
    await fetch(`${API}/inbox/${id}/read`, { method: "POST" });
    setInboxItems(i => i.map(x => x.id === id ? {...x, read_at: new Date().toISOString()} : x));
  };

  const deleteChat = async (chatId, e) => {
    e.stopPropagation();
    await fetch(`${API}/chats/${chatId}`, { method: "DELETE" });
    setChats(cs => cs.filter(c => c.id !== chatId));
  };

  const unreadInbox = inboxItems.filter(i => !i.read_at).length;
  const enabledAlerts = alertItems.filter(a => a.enabled).length;

  return (
    <div className="layout">
      <nav className="sidebar">
        <div className="logo">
          <a href="index.html"><img src="https://static.tildacdn.com/tild6333-6263-4639-b036-626634333039/logo_blgr.svg" alt="Drivee" border="0" /></a>
        </div>
        <a href="index.html" className="btn-new-chat">
          <svg className="icon-svg" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          Новый чат
        </a>
        <div className="nav-menu">
          <a href="index.html" className="nav-item">
            <svg className="icon-svg" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Чат
          </a>
          <div className="nav-item active">
            <svg className="icon-svg" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            Отчёты
          </div>
          <a href="dashboard.html" className="nav-item">
            <svg className="icon-svg" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Дашборд
          </a>
          <a href="index.html?view=archive" className="nav-item">
            <svg className="icon-svg" viewBox="0 0 24 24"><path d="M21 8V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v3m18 0v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8m18 0H3m7 5h4"/></svg>
            Архив
          </a>
          <a href="index.html?view=community" className="nav-item">
            <svg className="icon-svg" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2m8-10a4 4 0 1 0 0-8 4 4 0 0 0 0 8m14 10v-2a4 4 0 0 0-3-3.87"/></svg>
            Сообщество
          </a>
        </div>

        <div className="history-label">Недавние</div>
        <div className="chat-list">
          {chats.map(c => (
            <div
              key={c.id}
              className="chat-item"
              onClick={() => window.location.href = 'index.html'}
            >
              <div className="chat-item-title">{c.title}</div>
              <button
                className="btn-del-chat"
                onClick={(e) => deleteChat(c.id, e)}
              >
                <Icons.Trash />
              </button>
            </div>
          ))}
        </div>

        <div className="user-profile">
          <div className="user-name">{user?.username || 'Гость'}</div>
          <div className="btn-logout" onClick={handleLogout}>Выйти</div>
        </div>
      </nav>

      <div className="main">
        <TopBar 
          unreadInbox={unreadInbox}
          unreadAlerts={enabledAlerts}
          inboxItems={inboxItems}
          alertItems={alertItems}
          onMarkRead={markInboxRead}
          onOpenAlerts={() => setShowAlertsModal(true)}
        />
        <div className="content">
          <ReportsTab toast={toast} />
        </div>
      </div>

      <AlertsModal 
        open={showAlertsModal}
        alerts={alertItems}
        reports={reports}
        onClose={() => setShowAlertsModal(false)}
        onRefresh={() => { loadAlerts(); }}
        toast={toast}
      />

      <Toasts toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
