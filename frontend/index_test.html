<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Drivee Analytics</title>

  <!-- React -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #f6f7f9;
    }

    /* LAYOUT */

    .layout {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 230px;
      background: #fff;
      padding: 20px;
      border-right: 1px solid #eee;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .logo span { color: #A3E635; }

    .menu div {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .menu div:hover { background: #f3f4f6; }

    .menu .active {
      background: #ecfccb;
      color: #4d7c0f;
      font-weight: 600;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 60px;
      background: white;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
    }

    .search {
      width: 300px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .grid {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    /* COMPONENTS */

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
    }

    .kpi {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
    }

    .kpi-title {
      font-size: 13px;
      color: #166534;
    }

    .kpi-value {
      font-size: 32px;
      font-weight: bold;
      margin-top: 8px;
      color: #15803d;
    }

    .orders {
      grid-column: span 2;
    }

    .order {
      padding: 10px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .chat {
      grid-column: span 3;
    }

    .chat-box {
      height: 200px;
      overflow-y: auto;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .msg-user {
      text-align: right;
      margin-bottom: 8px;
      color: #111;
      font-weight: 500;
    }

    .msg-bot {
      background: #f9fafb;
      padding: 8px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .chat-input {
      display: flex;
      gap: 10px;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .btn {
      background: #A3E635;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;
const API = "http://localhost:8000";

/* SIDEBAR */
function Sidebar() {
  return (
    <div className="sidebar">
      <div className="logo">driv<span>ee</span></div>

      <div className="menu">
        <div className="active">Главная</div>
        <div>Заказы</div>
        <div>Водители</div>
        <div>Пассажиры</div>
        <div>Аналитика</div>
      </div>
    </div>
  );
}

/* TOPBAR */
function Topbar() {
  return (
    <div className="topbar">
      <input className="search" placeholder="Поиск..." />
      <div>Администратор</div>
    </div>
  );
}

/* KPI */
function KPI({ title, value }) {
  return (
    <div className="card kpi">
      <div className="kpi-title">{title}</div>
      <div className="kpi-value">{value}</div>
    </div>
  );
}

/* ORDERS */
function Orders({ list }) {
  return (
    <div className="card orders">
      <h3>Заказы</h3>
      {list.map((o, i) => (
        <div key={i} className="order">
          <b>{o.user}</b> → {o.route}
        </div>
      ))}
    </div>
  );
}

/* CHAT */
function Chat() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");

  const ask = async () => {
    if (!input) return;

    const res = await fetch(API + "/query", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({question: input})
    });

    const data = await res.json();

    setMessages([
      ...messages,
      {role: "user", text: input},
      {role: "bot", text: data.explanation || "Ошибка"}
    ]);

    setInput("");
  };

  return (
    <div className="card chat">
      <h3>AI аналитика</h3>

      <div className="chat-box">
        {messages.map((m, i) => (
          <div key={i} className={m.role === "user" ? "msg-user" : "msg-bot"}>
            {m.text}
          </div>
        ))}
      </div>

      <div className="chat-input">
        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          placeholder="Сколько отмен вчера?"
        />
        <button className="btn" onClick={ask}>Отправить</button>
      </div>
    </div>
  );
}

/* APP */
function App() {
  const [kpi, setKpi] = useState({orders: 0});

  useEffect(() => {
    fetch(API + "/kpi")
      .then(r => r.json())
      .then(setKpi)
      .catch(() => {});
  }, []);

  return (
    <div className="layout">
      <Sidebar />

      <div className="main">
        <Topbar />

        <div className="grid">

          <KPI title="Заказы" value={kpi.orders || 0} />
          <KPI title="Выполнено" value={kpi.done || 0} />
          <KPI title="Отмены" value={kpi.cancel || 0} />

          <Orders list={[
            {user:"Анна Смирнова", route:"Дом → Аэропорт"},
            {user:"Иван Петров", route:"Центр → Вокзал"}
          ]}/>

          <Chat />

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
