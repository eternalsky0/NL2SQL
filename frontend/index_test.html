<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drivee Analytics Platform</title>
  <link rel="icon" href="https://logo-teka.com/wp-content/uploads/2026/02/drivee-icon-logo.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  
  <style>
    :root {
      --brand-green: #96ea28;
      --brand-green-hover: #7ac517;
      --bg-main: #f5f6f8;
      --text-main: #1e1e1e;
      --text-muted: #8e8e93;
      --border-color: #ebebeb;
      --sidebar-width: 260px;
    }

    * { box-sizing: border-box; font-family: 'Noto Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    body, html { margin: 0; padding: 0; background: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; }

    .layout { display: flex; height: 100vh; }

    /* SIDEBAR */
    .sidebar { width: var(--sidebar-width); background: #fff; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 24px 12px; flex-shrink: 0; }
    .logo { padding: 0 12px; margin-bottom: 32px; cursor: pointer; }
    .logo img { height: 22px; display: block; }
    
    .btn-new-chat { 
      display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; 
      background: var(--brand-green); border-radius: 16px; cursor: pointer; 
      font-weight: 700; font-size: 14px; margin-bottom: 32px; transition: 0.2s; border: none;
    }
    .btn-new-chat:hover { background: var(--brand-green-hover); transform: translateY(-1px); }

    .nav-menu { display: flex; flex-direction: column; gap: 4px; margin-bottom: 24px; }
    .nav-item { 
      display: flex; align-items: center; gap: 12px; padding: 10px 16px; 
      border-radius: 10px; cursor: pointer; color: var(--text-main); 
      font-weight: 500; transition: 0.2s; font-size: 14px; 
    }
    .nav-item:hover { background: #f5f5f7; }
    .nav-item.active { background: var(--brand-green); color: #000; }

    .history-label { font-size: 11px; font-weight: 800; color: #ccc; padding: 0 16px 12px; letter-spacing: 1px; text-transform: uppercase; }
    .chat-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    .chat-item { 
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-radius: 12px; cursor: pointer; font-size: 13.5px; 
      color: #555; transition: 0.2s;
    }
    .chat-item:hover { background: #f5f5f7; }
    .chat-item.active { background: #f0f0f2; color: #000; font-weight: 600; }
    .chat-item-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; }
    
    .btn-del-chat { opacity: 0; transition: 0.2s; padding: 4px; border-radius: 6px; }
    .chat-item:hover .btn-del-chat { opacity: 0.3; }
    .btn-del-chat:hover { opacity: 1 !important; color: #ef4444; }

    .user-profile { margin-top: auto; padding: 16px 12px 0; border-top: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; }
    .user-name { font-size: 13px; font-weight: 700; }
    .btn-logout { cursor: pointer; opacity: 0.4; font-size: 12px; font-weight: 600; }

    /* MAIN AREA */
    .main-area { flex-grow: 1; display: flex; flex-direction: column; background: #fff; overflow: hidden; position: relative; }
    
    /* MESSAGES */
    .messages-container { flex-grow: 1; overflow-y: auto; padding: 40px 18% 160px 18%; display: flex; flex-direction: column; gap: 40px; scroll-behavior: smooth; }
    .msg-user { align-self: flex-end; max-width: 80%; background: #f4f4f7; padding: 16px 24px; border-radius: 20px 20px 4px 20px; font-size: 15px; line-height: 1.5; }
    .msg-bot { align-self: flex-start; width: 100%; display: flex; flex-direction: column; gap: 16px; }
    .bot-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; }
    .bot-text { font-size: 15px; color: #444; line-height: 1.6; flex-grow: 1; }
    .btn-save-report { background: #1e1e1e; color: #fff; border: none; padding: 6px 14px; border-radius: 8px; font-weight: 500; font-size: 12px; cursor: pointer; flex-shrink: 0; }

    /* RESULT CARDS */
    .result-card { background: #fff; border: 1px solid var(--border-color); border-radius: 24px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.03); margin-top: 8px; }
    .kpi-value { font-size: 64px; font-weight: 800; color: var(--text-main); letter-spacing: -3px; line-height: 1; margin: 15px 0; }

    /* INPUT SYSTEM */
    .input-dock { position: absolute; bottom: 0; left: 0; right: 0; padding: 32px 18% 48px 18%; background: linear-gradient(to top, #fff 80%, transparent); }
    .input-box { position: relative; display: flex; align-items: center; background: #fff; border: 1.5px solid var(--border-color); border-radius: 100px; padding: 6px 6px 6px 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
    .input-box:focus-within { border-color: var(--brand-green); }
    .input-field { flex-grow: 1; border: none; outline: none; font-size: 16px; padding: 12px 0; background: transparent; }
    .ghost-text { position: absolute; left: 24px; top: 18px; color: #ccc; pointer-events: none; white-space: nowrap; font-size: 16px; }
    .ghost-text span { color: transparent; }
    .btn-send { background: var(--brand-green); border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }

    /* COMMUNITY FEED */
    .community-view { flex-grow: 1; overflow-y: auto; background: var(--bg-main); padding: 40px; }
    .post-composer { background: #fff; padding: 24px; border-radius: 24px; margin-bottom: 40px; border: 1px solid var(--border-color); max-width: 800px; margin-left: auto; margin-right: auto; }
    .post-input { width: 100%; border: none; outline: none; font-size: 16px; resize: none; margin-bottom: 16px; }
    .post-query-input { width: 100%; background: #f9f9f9; padding: 12px 16px; border-radius: 12px; border: 1px solid #eee; font-size: 13px; font-family: monospace; outline: none; margin-bottom: 16px; }
    
    .post-card { background: #fff; padding: 32px; border-radius: 24px; border: 1px solid var(--border-color); margin-bottom: 24px; max-width: 800px; margin-left: auto; margin-right: auto; position: relative; }
    .post-user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .post-avatar { width: 36px; height: 36px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; }
    .post-content { font-size: 15px; line-height: 1.6; margin-bottom: 20px; color: #333; }
    .post-query-preview { background: #f5f5f7; padding: 16px; border-radius: 12px; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 16px; }

    /* ARCHIVE GRID */
    .archive-grid { padding: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; background: var(--bg-main); height: 100%; overflow-y: auto; align-items: start; }
    .archive-card { background: #fff; padding: 24px; border-radius: 20px; border: 1px solid var(--border-color); cursor: pointer; transition: 0.2s; position: relative; }
    .archive-card:hover { border-color: var(--brand-green); transform: translateY(-2px); }

    /* LOADER & UTILS */
    .spinner-box { display: flex; align-items: center; gap: 12px; margin-top: 10px; color: #888; }
    .spinner { border: 2px solid #f3f3f3; border-top: 2px solid var(--brand-green); border-radius: 50%; width: 22px; height: 22px; animation: spin 0.8s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .icon-svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
    
    .login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg-main); }
    .login-card { background: #fff; padding: 48px; border-radius: 32px; width: 400px; text-align: center; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const API = "http://localhost:8000";

const Icons = {
  Plus: () => <svg className="icon-svg" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>,
  Chat: () => <svg className="icon-svg" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
  Archive: () => <svg className="icon-svg" viewBox="0 0 24 24"><path d="M21 8V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v3m18 0v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8m18 0H3m7 5h4"/></svg>,
  Community: () => <svg className="icon-svg" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2m8-10a4 4 0 1 0 0-8 4 4 0 0 0 0 8m14 10v-2a4 4 0 0 0-3-3.87"/></svg>,
  Settings: () => <svg className="icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
  Trash: () => <svg className="icon-svg" viewBox="0 0 24 24"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
  Send: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>,
  Check: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>
};

function ChartView({ columns, rows }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current || !rows || rows.length <= 1) return;
    const chart = new Chart(canvasRef.current, {
      type: 'bar',
      data: {
        labels: rows.map(r => String(r[0])).slice(0, 10),
        datasets:[{ data: rows.map(r => Number(r[1]) || 0).slice(0, 10), backgroundColor: '#1e1e1e', hoverBackgroundColor: '#96ea28', borderRadius: 8 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#f0f0f0' } }, x: { grid: { display: false } } } }
    });
    return () => chart.destroy();
  }, [rows]);
  return <div style={{height: 240}}><canvas ref={canvasRef} /></div>;
}

function App() {
  const [user, setUser] = useState(JSON.parse(localStorage.getItem('user')));
  const [view, setView] = useState("chat");
  const [chats, setChats] = useState([]);
  const [currentChatId, setCurrentChatId] = useState(null);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [ghost, setGhost] = useState("");
  const [loading, setLoading] = useState(false);
  const [posts, setPosts] = useState([]);
  const scrollRef = useRef(null);

  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [messages, loading]);
  useEffect(() => { if (user) { loadChats(); loadCommunity(); } }, [user, view]);

  const loadChats = async () => {
    try { const res = await fetch(`${API}/chats/${user.username}`); setChats(await res.json()); } catch(e) {}
  };

  const loadCommunity = async () => {
    try { const res = await fetch(`${API}/community`); setPosts(await res.json()); } catch(e) {}
  };

  const shareInsight = async (e) => {
    e.preventDefault();
    const content = e.target.content.value;
    const query = e.target.query.value;
    if (!content || !query) return;
    
    await fetch(`${API}/community`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ username: user.username, content, query_text: query })
    });
    e.target.reset();
    loadCommunity();
  };

  const selectChat = async (id) => {
    setCurrentChatId(id); setLoading(true); setView("chat");
    try { const res = await fetch(`${API}/chats/history/${id}`); setMessages(await res.json()); } catch(e) {}
    setLoading(false);
  };

  const ask = async (text) => {
    if (!text.trim()) return;
    setMessages(prev => [...prev, {role: "user", content: text}]);
    setInput(""); setGhost(""); setLoading(true); setView("chat");
    try {
      const res = await fetch(`${API}/query`, {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ chat_id: currentChatId, username: user.username, question: text, history: messages.map(m => ({role: m.role, content: m.content})) })
      });
      const data = await res.json();
      if (res.ok) { setMessages(prev => [...prev, data]); if (!currentChatId) { setCurrentChatId(data.chat_id); loadChats(); } }
      else { throw new Error(data.detail); }
    } catch (e) { setMessages(prev => [...prev, {role: 'assistant', content: "Ошибка: " + e.message, error: true}]); }
    setLoading(false);
  };

  const handleLogin = async (e) => {
    e.preventDefault();
    try {
        const res = await fetch(`${API}/login`, {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({username: e.target.username.value, password: e.target.password.value})
        });
        if (res.ok) { const data = await res.json(); localStorage.setItem('user', JSON.stringify(data)); setUser(data); }
        else alert("Неверные данные");
    } catch(e) { alert("Сервер недоступен"); }
  };

  const fetchGhost = async (text) => {
    if (text.length < 3) { setGhost(""); return; }
    try {
      const res = await fetch(`${API}/suggest/ghost`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ prefix: text }) });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let streamTxt = "";
      while (true) {
        const { value, done } = await reader.read(); if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split("\n");
        for (const line of lines) { if (line.startsWith("data: ")) { const jsonStr = line.replace("data: ", "").trim(); if (jsonStr === "[DONE]") break; try { streamTxt += JSON.parse(jsonStr).text; setGhost(streamTxt); } catch (e) {} } }
      }
    } catch (err) {}
  };

  useEffect(() => { const t = setTimeout(() => fetchGhost(input), 300); return () => clearTimeout(t); }, [input]);

  if (!user) return (
    <div className="login-screen">
      <form className="login-card" onSubmit={handleLogin}>
        <img src="https://static.tildacdn.com/tild6333-6263-4639-b036-626634333039/logo_blgr.svg" style={{height: 28, marginBottom: 40}} />
        <input name="username" className="login-input" placeholder="Логин" required />
        <input name="password" type="password" className="login-input" placeholder="Пароль" required />
        <button type="submit" className="btn-new-chat" style={{width: '100%', marginTop: 10}}>Войти</button>
      </form>
    </div>
  );

  return (
    <div className="layout">
      <aside className="sidebar">
        <div className="logo" onClick={() => {setCurrentChatId(null); setMessages([]); setView("chat");}}>
          <img src="https://static.tildacdn.com/tild6333-6263-4639-b036-626634333039/logo_blgr.svg" />
        </div>
        <button className="btn-new-chat" onClick={() => {setCurrentChatId(null); setMessages([]); setView("chat");}}><Icons.Plus /> Новый чат</button>
        <nav className="nav-menu">
           <div className={`nav-item ${view === 'chat' ? 'active' : ''}`} onClick={() => setView('chat')}><Icons.Chat /> Чат</div>
           <div className={`nav-item ${view === 'archive' ? 'active' : ''}`} onClick={() => setView('archive')}><Icons.Archive /> Архив</div>
           <div className={`nav-item ${view === 'community' ? 'active' : ''}`} onClick={() => setView('community')}><Icons.Community /> Сообщество</div>
           <div className={`nav-item ${view === 'automation' ? 'active' : ''}`} onClick={() => setView('automation')}><Icons.Settings /> Автоматизация</div>
        </nav>
        <div className="history-label">НЕДАВНИЕ</div>
        <div className="chat-list">
          {chats.map(c => (
            <div key={c.id} className={`chat-item ${currentChatId === c.id && view === 'chat' ? 'active' : ''}`} onClick={() => selectChat(c.id)}>
              <div className="chat-item-title">{c.title}</div>
              <div className="btn-del-chat" onClick={(e) => {e.stopPropagation(); fetch(`${API}/chats/${c.id}`, {method:"DELETE"}).then(loadChats);}}><Icons.Trash /></div>
            </div>
          ))}
        </div>
        <div className="user-profile">
          <div className="user-name">{user.username}</div>
          <div className="btn-logout" onClick={() => {localStorage.clear(); window.location.reload();}}>Выйти</div>
        </div>
      </aside>

      <main className="main-area">
        {view === "chat" ? (
          <>
            <div className="messages-container" ref={scrollRef}>
              {messages.length === 0 && (
                <div style={{margin: 'auto', textAlign: 'center', opacity: 0.1}}>
                  <img src="https://static.tildacdn.com/tild6333-6263-4639-b036-626634333039/logo_blgr.svg" style={{width: 140}} />
                </div>
              )}
              {messages.map((m, idx) => (
                <div key={idx} className={m.role === 'user' ? 'msg-user' : 'msg-bot'}>
                  <div className="bot-header">
                    <div className="bot-text">{m.content}</div>
                    {m.data && <button className="btn-save-report" onClick={() => alert("Сохранено в архив")}>В архив</button>}
                  </div>
                  {m.data && !m.error && (
                    <div className="result-card">
                      {m.data.data.rows.length === 1 && m.data.data.columns.length === 1 ? (
                        <div style={{textAlign: 'center', padding: 10}}>
                          <div style={{fontSize: 11, color: '#888', textTransform: 'uppercase'}}>{m.data.data.columns[0]}</div>
                          <div className="kpi-value">{m.data.data.rows[0][0].toLocaleString('ru-RU')}</div>
                        </div>
                      ) : (
                        <>
                          <ChartView columns={m.data.data.columns} rows={m.data.data.rows} />
                          <div className="table-holder">
                            <table>
                              <thead><tr>{m.data.data.columns.map((c, i) => <th key={i}>{c}</th>)}</tr></thead>
                              <tbody>{m.data.data.rows.slice(0, 5).map((row, i) => (<tr key={i}>{row.map((cell, j) => <td key={j}>{cell}</td>)}</tr>))}</tbody>
                            </table>
                          </div>
                        </>
                      )}
                    </div>
                  )}
                </div>
              ))}
              {loading && <div className="msg-bot"><div className="spinner-box"><div className="spinner"></div> Считаю...</div></div>}
            </div>
            <div className="input-dock">
              <div className="input-box">
                <div className="ghost-text"><span>{input}</span>{ghost && (input.endsWith(' ') ? ghost : ' ' + ghost)}</div>
                <input className="input-field" placeholder="Спроси Drivee..." value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if(e.key === 'Tab' && ghost) { e.preventDefault(); setInput(input + (input.endsWith(' ') ? '' : ' ') + ghost); setGhost(""); } if(e.key === 'Enter') ask(input); }} />
                <button className="btn-send" onClick={() => ask(input)}><Icons.Send /></button>
              </div>
            </div>
          </>
        ) : view === "archive" ? (
          <div className="archive-grid">
             {chats.map(c => (
              <div key={c.id} className="archive-card" onClick={() => selectChat(c.id)}>
                <h4>{c.title}</h4>
                <p>Дата создания: {new Date(c.created_at).toLocaleDateString()}</p>
              </div>
            ))}
          </div>
        ) : view === "community" ? (
            <div className="community-view">
                <form className="post-composer" onSubmit={shareInsight}>
                    <textarea name="content" className="post-input" placeholder="Поделитесь инсайтом или находкой..." rows="2" required></textarea>
                    <input name="query" className="post-query-input" placeholder="Приложите запрос (например: Выручка по городам за вчера)" required />
                    <div style={{display:'flex', justifyContent:'flex-end'}}>
                        <button type="submit" className="btn-new-chat" style={{marginBottom:0, padding:'8px 24px'}}>Поделиться</button>
                    </div>
                </form>
                
                {posts.map(post => (
                    <div key={post.id} className="post-card">
                        <div className="post-user-info">
                            <div className="post-avatar">{post.username[0].toUpperCase()}</div>
                            <div>
                                <div style={{fontWeight:800, fontSize:14}}>{post.username}</div>
                                <div style={{fontSize:11, color:'#aaa'}}>{new Date(post.created_at).toLocaleString()}</div>
                            </div>
                        </div>
                        <div className="post-content">{post.content}</div>
                        <div className="post-query-preview">Запрос: {post.query_text}</div>
                        <button className="btn-new-chat" style={{marginBottom:0, fontSize:12, padding:'6px 16px', background:'#f0f0f2', color:'#000'}} onClick={() => ask(post.query_text)}>Использовать</button>
                    </div>
                ))}
            </div>
        ) : (

                        <div><div style={{fontSize: 14, fontWeight:600}}>Выручка (09:00 AM)</div><div style={{fontSize:12, color:'#8e8e93'}}>alina@drivee.com</div></div>
