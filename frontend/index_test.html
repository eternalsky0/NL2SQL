<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drivee · Интеллектуальная аналитика</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --brand-green: #9df123;
      --brand-dark: #111827;
      --bg-gradient: linear-gradient(135deg, #4f46e5 0%, #0ea5e9 100%);
    }

    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-gradient); height: 100vh; overflow: hidden; }

    .navbar { 
      position: relative; z-index: 100; display: flex; align-items: center; justify-content: space-between; 
      padding: 10px 40px; background: white; border-bottom: 1px solid #eee;
    }
    .logo-container img { height: 32px; width: auto; }
    .nav-links { display: flex; gap: 30px; font-weight: 500; font-size: 14px; }
    .nav-links a { color: var(--brand-dark); text-decoration: none; }
    .btn-main { background: var(--brand-green); border: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }

    .app-shell { 
      width: calc(100% - 60px); max-width: 1400px; height: calc(100vh - 100px); 
      margin: 20px auto; background: white; border-radius: 24px; display: flex; overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    /* ЛЕВАЯ ПАНЕЛЬ */
    .sidebar { width: 40%; padding: 30px; border-right: 1px solid #f0f0f0; display: flex; flex-direction: column; background: #fafafa; }
    .input-group { position: relative; margin-bottom: 20px; }
    .main-input { 
      width: 100%; padding: 18px 20px; border: 2px solid #eee; border-radius: 16px; 
      font-size: 16px; outline: none; background: white; position: relative; z-index: 2;
    }
    .ghost-layer { position: absolute; top: 18px; left: 20px; font-size: 16px; color: #aaa; z-index: 1; pointer-events: none; }
    .ghost-layer span { color: transparent; }

    /* КОНТЕЙНЕР ДЛЯ СЦЕНАРИЕВ (В ОДНУ СТРОКУ) */
    .chips-row {
      display: flex;
      gap: 8px;
      flex-wrap: nowrap; /* Запрет переноса */
      margin-bottom: 20px;
      overflow-x: auto; /* Скролл, если вдруг не влезет на очень узком экране */
      padding-bottom: 4px;
    }
    .chips-row::-webkit-scrollbar { height: 0px; } /* Скрываем скроллбар */

    .chip { 
      white-space: nowrap; /* Текст внутри не переносится */
      display: inline-block; padding: 8px 16px; background: white; border: 1px solid #ddd; 
      border-radius: 20px; cursor: pointer; font-size: 13px; transition: 0.2s;
      flex-shrink: 0;
    }
    .chip:hover { border-color: var(--brand-green); background: #f9fff0; }
    .chip.active { border-color: var(--brand-green); border-width: 1.5px; color: #000; }

    .sql-preview { 
      margin-top: auto; background: #1a202c; color: #a0aec0; padding: 20px; 
      border-radius: 16px; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto;
    }

    /* ПРАВАЯ ПАНЕЛЬ */
    .content-area { 
      width: 60%; background: #f4f7f9; overflow-y: auto; 
      padding: 30px; display: flex; flex-direction: column; gap: 20px; 
    }
    
    .card { 
      background: white; border-radius: 20px; padding: 30px; width: 100%; height: auto;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .card-header h2 { margin: 0; font-size: 20px; }
    .badge { background: var(--brand-green); color: black; padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 800; text-transform: uppercase; }

    .kpi-wrapper { padding: 40px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .kpi-label { font-size: 16px; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .kpi-value { font-size: 80px; font-weight: 900; color: #4f46e5; letter-spacing: -3px; }

    .chart-box { height: 320px; width: 100%; margin-bottom: 25px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 12px; border-bottom: 2px solid #f0f0f0; color: #64748b; }
    td { padding: 12px; border-bottom: 1px solid #f8f8f8; color: #1e293b; }

    .status-banner { 
      background: white; border-radius: 12px; padding: 16px; 
      display: flex; align-items: center; gap: 10px; 
      font-weight: 600; color: #374151; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      border: 1px solid #e2e8f0;
    }
    .status-icon { width: 22px; height: 22px; background: var(--brand-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 12px; }

    .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--brand-green); border-radius: 50%; animation: spin 1s linear infinite; margin: auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;
const API = "http://localhost:8000";

const CheckIcon = () => <svg fill="none" viewBox="0 0 24 24" strokeWidth={3} stroke="currentColor" width="12" height="12"><path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>;

const TRANSLATIONS = {
  "revenue": "Выручка", "total_orders": "Всего заказов", "cancel_count": "Количество отмен",
  "avg_price": "Средний чек", "city_id": "Город", "order_timestamp": "Дата", "status_order": "Статус заказа", "price_order_local": "Стоимость"
};
const translate = (txt) => TRANSLATIONS[txt.toLowerCase()] || txt;

function ChartDisplay({ columns, rows }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current) return;
    const chart = new Chart(canvasRef.current, {
      type: 'bar',
      data: {
        labels: rows.map(r => String(r[0])).slice(0, 15),
        datasets: [{
          label: translate(columns[1] || 'Значение'),
          data: rows.map(r => Number(r[1]) || 0).slice(0, 15),
          backgroundColor: '#4f46e5',
          borderRadius: 8
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
    return () => chart.destroy();
  }, [rows]);
  return <div className="chart-box"><canvas ref={canvasRef} /></div>;
}

function App() {
  const [input, setInput] = useState("");
  const [ghost, setGhost] = useState("");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [activeChip, setActiveChip] = useState("");

  const fetchGhost = async (v) => {
    if (v.length < 3) { setGhost(""); return; }
    try {
      const res = await fetch(`${API}/suggest/ghost`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prefix: v })
      });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let streamTxt = "";
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        const lines = decoder.decode(value).split("\n");
        for (const line of lines) {
          if (line.startsWith("data: ")) {
            const chunk = line.replace("data: ", "").trim();
            if (chunk === "[DONE]") break;
            try { streamTxt += JSON.parse(chunk).text; setGhost(streamTxt); } catch(e){}
          }
        }
      }
    } catch(e){}
  };

  useEffect(() => {
    const t = setTimeout(() => fetchGhost(input), 300);
    return () => clearTimeout(t);
  }, [input]);

  const ask = async (q) => {
    if(!q) return;
    setInput(q); setActiveChip(q); setLoading(true); setResult(null);
    try {
      const r = await fetch(`${API}/query`, {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({question: q})
      });
      const data = await r.json();
      setResult(data);
    } catch(e){ setResult({error: true, message: e.message}); }
    setLoading(false);
  };

  const isKpi = result && !result.error && result.data.rows.length === 1;

  return (
    <div style={{height: '100%'}}>
      <nav className="navbar">
        <div className="logo-container">
          <img src="https://static.tildacdn.com/tild6333-6263-4639-b036-626634333039/logo_blgr.svg" alt="Drivee" />
        </div>
        <div className="nav-links">
          <a href="#">Аналитика</a>
          <a href="#">Отчеты</a>
          <a href="#">Справка</a>
        </div>
        <button className="btn-main" onClick={() => {setInput(""); setResult(null); setActiveChip("");}}>Новый запрос</button>
      </nav>

      <div className="app-shell">
        <div className="sidebar">
          <h2 style={{marginTop: 0, fontSize: '24px', fontWeight: '700'}}>Задать вопрос</h2>
          <div className="input-group">
            <div className="ghost-layer"><span>{input}</span>{ghost && (input.endsWith(' ') ? ghost : ' ' + ghost)}</div>
            <input 
              className="main-input" 
              value={input} 
              onChange={e => {setInput(e.target.value); setActiveChip("");}}
              onKeyDown={e => {
                if (e.key === 'Tab' && ghost) { e.preventDefault(); setInput(input + (input.endsWith(' ') ? '' : ' ') + ghost); setGhost(""); }
                if (e.key === 'Enter') { e.preventDefault(); ask(input); }
              }}
              placeholder="Спроси Drivee..."
            />
          </div>
          
          {/* ФЛЕКС-РЯД ДЛЯ СЦЕНАРИЕВ */}
          <div className="chips-row">
            <div className={`chip ${activeChip === "Выручка за вчера" ? "active" : ""}`} onClick={() => ask("Выручка за вчера")}>Выручка за вчера</div>
            <div className={`chip ${activeChip === "Отмены по городам" ? "active" : ""}`} onClick={() => ask("Отмены по городам")}>Отмены по городам</div>
            <div className={`chip ${activeChip === "Всего заказов" ? "active" : ""}`} onClick={() => ask("Всего заказов")}>Всего заказов</div>
          </div>

          {result && <div className="sql-preview">{result.sql}</div>}
        </div>

        <div className="content-area">
          {loading ? (
            <div className="spinner"></div>
          ) : result && !result.error ? (
            <>
              <div style={{marginBottom: 10, fontSize: 13, color: '#64748b'}}>
                Система поняла: <i>{result.explanation}</i>
              </div>
              
              <div className="card">
                <div className="card-header">
                  <h2>Результат анализа</h2>
                  <span className="badge">SQL-done</span>
                </div>

                {isKpi ? (
                  <div className="kpi-wrapper">
                    <div className="kpi-label">{translate(result.data.columns[result.data.columns.length - 1])}</div>
                    <div className="kpi-value">
                      {(() => {
                        const val = result.data.rows[0][result.data.rows[0].length - 1];
                        return typeof val === 'number' ? val.toLocaleString('ru-RU') : val;
                      })()}
                    </div>
                  </div>
                ) : (
                  <div style={{display:'flex', flexDirection:'column', width:'100%'}}>
                    <ChartDisplay columns={result.data.columns} rows={result.data.rows} />
                    <table>
                      <thead>
                        <tr>{result.data.columns.map((c, i) => <th key={i}>{translate(c)}</th>)}</tr>
                      </thead>
                      <tbody>
                        {result.data.rows.map((row, i) => (
                          <tr key={i}>{row.map((cell, j) => <td key={j}>{cell}</td>)}</tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>

              <div className="status-banner">
                <div className="status-icon"><CheckIcon/></div>
                Данные успешно загружены из базы Drivee
              </div>
            </>
          ) : (
            <div style={{margin:'auto', opacity: 0.1, textAlign:'center'}}>
               <img src="https://static.tildacdn.com/tild6333-6263-4639-b036-626634333039/logo_blgr.svg" style={{height: 100}} />
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
