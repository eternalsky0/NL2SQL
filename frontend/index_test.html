<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drivee · Интеллектуальная аналитика</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --brand-green: #9df123;
      --brand-dark: #111827;
      --bg-gradient: linear-gradient(135deg, #4f46e5 0%, #0ea5e9 100%);
    }
    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg-gradient); height: 100vh; overflow: hidden; }
    .navbar { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 10px 40px; background: white; border-bottom: 1px solid #eee; }
    .logo-container img { height: 32px; width: auto; }
    .btn-main { background: var(--brand-green); border: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    .app-shell { width: calc(100% - 60px); max-width: 1400px; height: calc(100vh - 100px); margin: 20px auto; background: white; border-radius: 24px; display: flex; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
    .sidebar { width: 35%; padding: 30px; border-right: 1px solid #f0f0f0; display: flex; flex-direction: column; background: #fafafa; }
    .main-input { width: 100%; padding: 18px 20px; border: 2px solid #eee; border-radius: 16px; font-size: 16px; outline: none; background: white; position: relative; z-index: 2; }
    .main-input:focus { border-color: var(--brand-green); }
    .ghost-layer { position: absolute; top: 18px; left: 20px; font-size: 16px; color: #aaa; z-index: 1; pointer-events: none; white-space: nowrap; }
    .ghost-layer span { color: transparent; }
    .chip { display: inline-block; padding: 8px 16px; background: white; border: 1px solid #ddd; border-radius: 20px; margin: 0 8px 8px 0; cursor: pointer; font-size: 13px; }
    .sql-preview { margin-top: auto; background: #1a202c; color: #a0aec0; padding: 20px; border-radius: 16px; font-family: monospace; font-size: 12px; max-height: 150px; overflow-y: auto; }
    .content-area { width: 65%; padding: 30px; background: #f4f7f9; display: flex; flex-direction: column; overflow-y: auto; }
    .card { background: white; border-radius: 20px; padding: 30px; flex-grow: 1; display: flex; flex-direction: column; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .kpi-wrapper { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.5s ease-out; }
    .kpi-label { font-size: 18px; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .kpi-value { font-size: 84px; font-weight: 900; color: #4f46e5; letter-spacing: -3px; }
    .chart-box { height: 300px; width: 100%; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 12px; border-bottom: 2px solid #f0f0f0; color: #64748b; }
    td { padding: 12px; border-bottom: 1px solid #f8f8f8; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--brand-green); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;
const API = "http://localhost:8000";

// Карта перевода для подстраховки
const TRANSLATIONS = {
  "revenue": "Выручка",
  "total_orders": "Всего заказов",
  "cancel_count": "Количество отмен",
  "avg_price": "Средний чек",
  "city_id": "ID Города",
  "order_timestamp": "Дата и время",
  "status_order": "Статус заказа",
  "distance_in_meters": "Дистанция (м)",
  "duration_in_seconds": "Длительность (сек)",
  "price_order_local": "Стоимость"
};

const translateHeader = (h) => {
  const low = h.toLowerCase();
  return TRANSLATIONS[low] || h; // Если нет в словаре, оставляем как есть (LLM должна сама назвать по-русски)
};

function ChartDisplay({ columns, rows }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current) return;
    const ctx = canvasRef.current.getContext('2d');
    const chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: rows.map(r => String(r[0])).slice(0, 10),
        datasets: [{
          label: translateHeader(columns[1] || 'Значение'),
          data: rows.map(r => Number(r[1]) || 0).slice(0, 10),
          backgroundColor: '#4f46e5',
          borderRadius: 8
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true }, x: { grid: { display: false } } }
      }
    });
    return () => chart.destroy();
  }, [rows]);
  return <div className="chart-box"><canvas ref={canvasRef} /></div>;
}

function App() {
  const [input, setInput] = useState("");
  const [ghost, setGhost] = useState("");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);

  const fetchGhost = async (val) => {
    if (val.length < 3) { setGhost(""); return; }
    try {
      const res = await fetch(`${API}/suggest/ghost`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prefix: val })
      });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let streamTxt = "";
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        const lines = decoder.decode(value).split("\n");
        for (const line of lines) {
          if (line.startsWith("data: ")) {
            const chunk = line.replace("data: ", "").trim();
            if (chunk === "[DONE]") break;
            try { streamTxt += JSON.parse(chunk).text; setGhost(streamTxt); } catch(e){}
          }
        }
      }
    } catch(e){}
  };

  useEffect(() => {
    const t = setTimeout(() => fetchGhost(input), 300);
    return () => clearTimeout(t);
  }, [input]);

  const ask = async (q) => {
    if(!q) return;
    setInput(q); setLoading(true); setResult(null);
    try {
      const r = await fetch(`${API}/query`, {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({question: q})
      });
      const data = await r.json();
      setResult(data);
    } catch(e){ setResult({error: true, message: e.message}); }
    setLoading(false);
  };

  const isKpiMode = result && !result.error && result.data.rows.length === 1;

  return (
    <div style={{height: '100%'}}>
      <nav className="navbar">
        <div className="logo-container">
          <img src="https://static.tildacdn.com/tild6333-6263-4639-b036-626634333039/logo_blgr.svg" alt="Drivee" />
        </div>
        <div style={{fontWeight: 600}}>Интеллектуальная аналитика</div>
        <button className="btn-main" onClick={() => {setInput(""); setResult(null);}}>Новый запрос</button>
      </nav>

      <div className="app-shell">
        <div className="sidebar">
          <div style={{position: 'relative', marginBottom: 20}}>
            <div className="ghost-layer"><span>{input}</span>{ghost && (input.endsWith(' ') ? ghost : ' ' + ghost)}</div>
            <input 
              className="main-input" 
              value={input} 
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => {
                if (e.key === 'Tab' && ghost) { e.preventDefault(); setInput(input + (input.endsWith(' ') ? '' : ' ') + ghost); setGhost(""); }
                if (e.key === 'Enter') { e.preventDefault(); ask(input); }
              }}
              placeholder="Спроси Drivee..."
            />
          </div>
          <div>
            <div className="chip" onClick={() => ask("Выручка за вчера")}>Выручка за вчера</div>
            <div className="chip" onClick={() => ask("Сравни отмены по городам")}>Отмены по городам</div>
            <div className="chip" onClick={() => ask("Сколько сегодня заказов")}>Заказы за сегодня</div>
          </div>
          {result && <div className="sql-preview">{result.sql}</div>}
        </div>

        <div className="content-area">
          {loading ? (
            <div style={{margin:'auto', textAlign:'center'}}><div className="spinner"></div>Считаем...</div>
          ) : result && !result.error ? (
            <>
              <div style={{marginBottom: 15, fontSize: 13, color: '#64748b'}}>
                Логика: <i>{result.explanation}</i>
              </div>
              <div className="card">
                <div className="card-header">
                  <h2 style={{fontSize: 18}}>Результат</h2>
                  <span style={{background:'#f1f5f9', padding:'4px 10px', borderRadius:6, fontSize:12, fontWeight:700}}>DRIVEE-SQL-OK</span>
                </div>

                {isKpiMode ? (
                  <div className="kpi-wrapper">
                    <div className="kpi-label">{translateHeader(result.data.columns[result.data.columns.length - 1])}</div>
                    <div className="kpi-value">
                      {(() => {
                        const val = result.data.rows[0][result.data.rows[0].length - 1];
                        return typeof val === 'number' ? val.toLocaleString('ru-RU') : val;
                      })()}
                    </div>
                  </div>
                ) : (
                  <div style={{display:'flex', flexDirection:'column', height:'100%'}}>
                    <ChartDisplay columns={result.data.columns} rows={result.data.rows} />
                    <div style={{overflowY:'auto', flexGrow: 1}}>
                      <table>
                        <thead>
                          <tr>{result.data.columns.map((c, i) => <th key={i}>{translateHeader(c)}</th>)}</tr>
                        </thead>
                        <tbody>
                          {result.data.rows.slice(0, 10).map((row, i) => (
                            <tr key={i}>{row.map((cell, j) => <td key={j}>{cell}</td>)}</tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </div>
            </>
          ) : (
            <div style={{margin:'auto', opacity: 0.2, textAlign:'center'}}>
               <img src="https://static.tildacdn.com/tild6333-6263-4639-b036-626634333039/logo_blgr.svg" style={{height: 60}} />
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
