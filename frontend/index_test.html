<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drivee · Интеллектуальная аналитика</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --brand-green: #9df123;
      --brand-dark: #111827;
      --bg-gradient: linear-gradient(135deg, #4f46e5 0%, #0ea5e9 100%);
    }

    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-gradient); height: 100vh; overflow: hidden; }

    /* НАВИГАЦИЯ */
    .navbar { 
      position: relative; z-index: 100; display: flex; align-items: center; justify-content: space-between; 
      padding: 12px 40px; background: white; border-bottom: 1px solid #eee;
    }
    .logo-container img { height: 32px; width: auto; }
    .nav-links { display: flex; gap: 35px; font-weight: 500; font-size: 14px; }
    .nav-links a { color: var(--brand-dark); text-decoration: none; }
    .btn-main { background: var(--brand-green); border: none; padding: 10px 22px; border-radius: 12px; font-weight: 700; cursor: pointer; }

    /* ГЛАВНЫЙ КОНТЕЙНЕР */
    .app-shell { 
      width: calc(100% - 60px); max-width: 1400px; height: calc(100vh - 110px); 
      margin: 15px auto; background: white; border-radius: 24px; display: flex; overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    /* ЛЕВАЯ ПАНЕЛЬ */
    .sidebar { width: 35%; padding: 30px; border-right: 1px solid #f0f0f0; display: flex; flex-direction: column; background: #fafafa; }
    .main-input { width: 100%; padding: 18px 20px; border: 2px solid #eee; border-radius: 16px; font-size: 16px; outline: none; background: white; }
    .chip { display: inline-block; padding: 8px 16px; background: white; border: 1px solid #ddd; border-radius: 20px; margin: 0 8px 8px 0; cursor: pointer; font-size: 13px; }
    .sql-preview { margin-top: auto; background: #1a202c; color: #a0aec0; padding: 20px; border-radius: 16px; font-family: monospace; font-size: 11px; max-height: 180px; overflow-y: auto; }

    /* ПРАВАЯ ПАНЕЛЬ (ОБНОВЛЕННЫЙ СКРОЛЛ) */
    .content-area { 
      width: 65%; 
      background: #f4f7f9; 
      overflow-y: auto; /* Скроллится вся правая часть */
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* КАРТОЧКА (ОБНОВЛЕНА) */
    .card { 
      background: white; 
      border-radius: 20px; 
      padding: 30px; 
      width: 100%;
      min-height: min-content; /* Карточка растягивается под контент */
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .badge { background: var(--brand-green); color: black; padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 800; }

    /* ТАБЛИЦА (УБРАН ВНУТРЕННИЙ СКРОЛЛ) */
    .table-container { width: 100%; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
    th { text-align: left; padding: 12px; border-bottom: 2px solid #f0f0f0; color: #64748b; }
    td { padding: 12px; border-bottom: 1px solid #f8f8f8; color: #1e293b; }

    /* ПЛАШКА СТАТУСА (ТЕПЕРЬ ПОСЛЕ ТАБЛИЦЫ) */
    .status-banner { 
      background: white; 
      border-radius: 16px; 
      padding: 18px 24px; 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      font-weight: 600; 
      color: #374151;
      border: 1px solid #e2e8f0;
      margin-bottom: 10px; /* Чтобы не прилипала к самому низу */
    }
    .status-icon { 
      width: 22px; height: 22px; background: var(--brand-green); 
      border-radius: 50%; display: flex; align-items: center; justify-content: center; 
      color: #000; font-size: 13px;
    }

    /* KPI */
    .kpi-wrapper { padding: 60px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .kpi-value { font-size: 84px; font-weight: 900; color: #4f46e5; letter-spacing: -3px; }
    .kpi-label { font-size: 18px; color: #64748b; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }

    .chart-box { height: 320px; width: 100%; margin-bottom: 30px; }

    .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--brand-green); border-radius: 50%; animation: spin 1s linear infinite; margin: auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;
const API = "http://localhost:8000";

const CheckIcon = () => <svg fill="none" viewBox="0 0 24 24" strokeWidth={3} stroke="currentColor" width="12" height="12"><path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>;

function ChartDisplay({ columns, rows }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current) return;
    const chart = new Chart(canvasRef.current, {
      type: 'bar',
      data: {
        labels: rows.map(r => String(r[0])).slice(0, 15),
        datasets: [{
          data: rows.map(r => Number(r[1]) || 0).slice(0, 15),
          backgroundColor: '#4f46e5',
          borderRadius: 8
        }]
      },
      options: { 
        responsive: true, 
        maintainAspectRatio: false, 
        plugins: { legend: { display: false } },
        scales: { x: { grid: { display: false } } }
      }
    });
    return () => chart.destroy();
  }, [rows]);
  return <div className="chart-box"><canvas ref={canvasRef} /></div>;
}

function App() {
  const [input, setInput] = useState("");
  const [ghost, setGhost] = useState("");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);

  const fetchGhost = async (v) => {
    if (v.length < 3) { setGhost(""); return; }
    try {
      const res = await fetch(`${API}/suggest/ghost`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prefix: v })
      });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let streamTxt = "";
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split("\n");
        for (const line of lines) {
          if (line.startsWith("data: ")) {
            const data = JSON.parse(line.replace("data: ", "").trim());
            if (data === "[DONE]") break;
            streamTxt += data.text; setGhost(streamTxt);
          }
        }
      }
    } catch(e){}
  };

  useEffect(() => {
    const t = setTimeout(() => fetchGhost(input), 300);
    return () => clearTimeout(t);
  }, [input]);

  const ask = async (q) => {
    if(!q) return;
    setInput(q); setLoading(true); setResult(null);
    try {
      const r = await fetch(`${API}/query`, {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({question: q})
      });
      const data = await r.json();
      setResult(data);
    } catch(e){ setResult({error: true, message: e.message}); }
    setLoading(false);
  };

  const isKpi = result && !result.error && result.data.rows.length === 1;

  return (
    <div style={{height: '100%'}}>
      <nav className="navbar">
        <div className="logo-container">
          <img src="https://static.tildacdn.com/tild6333-6263-4639-b036-626634333039/logo_blgr.svg" alt="Drivee" />
        </div>
        <div className="nav-links">
          <a href="#">Аналитика</a>
          <a href="#">Отчеты</a>
          <a href="#">Справка</a>
        </div>
        <button className="btn-main" onClick={() => {setInput(""); setResult(null);}}>Новый запрос</button>
      </nav>

      <div className="app-shell">
        <div className="sidebar">
          <h3 style={{marginTop: 0}}>Ваш вопрос</h3>
          <div style={{position: 'relative', marginBottom: 20}}>
            <input 
              className="main-input" 
              value={input} 
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && ask(input)}
              placeholder="Спроси Drivee..."
            />
          </div>
          <div className="chip" onClick={() => ask("Выручка по водителям за вчера")}>Выручка по водителям</div>
          <div className="chip" onClick={() => ask("Сравни отмены по городам")}>Отмены по городам</div>
          {result && <div className="sql-preview">{result.sql}</div>}
        </div>

        <div className="content-area">
          {loading ? (
            <div className="spinner"></div>
          ) : result && !result.error ? (
            <>
              <div style={{color: '#64748b', fontSize: 13}}>
                Понял как: <b>{result.explanation}</b>
              </div>
              
              {/* БЕЛАЯ КАРТОЧКА: ТЕПЕРЬ ОНА РАСТЯГИВАЕТСЯ */}
              <div className="card">
                <div className="card-header">
                  <h2>Результат анализа</h2>
                  <span className="badge">SQL-done</span>
                </div>

                {isKpi ? (
                  <div className="kpi-wrapper">
                    <div className="kpi-label">{result.data.columns[0]}</div>
                    <div className="kpi-value">{result.data.rows[0][0].toLocaleString('ru-RU')}</div>
                  </div>
                ) : (
                  <div className="table-container">
                    <ChartDisplay columns={result.data.columns} rows={result.data.rows} />
                    <table>
                      <thead>
                        <tr>{result.data.columns.map((c, i) => <th key={i}>{c}</th>)}</tr>
                      </thead>
                      <tbody>
                        {result.data.rows.map((row, i) => (
                          <tr key={i}>{row.map((cell, j) => <td key={j}>{cell}</td>)}</tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>

              {/* ПЛАШКА: ТЕПЕРЬ ОНА ПРОСТО ИДЕТ СЛЕДОМ ЗА КАРТОЧКОЙ */}
              <div className="status-banner">
                <div className="status-icon"><CheckIcon/></div>
                Данные успешно загружены из базы Drivee
              </div>
            </>
          ) : (
            <div style={{margin:'auto', opacity: 0.1, textAlign:'center'}}>
               <img src="https://static.tildacdn.com/tild6333-6263-4639-b036-626634333039/logo_blgr.svg" style={{height: 80}} />
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
