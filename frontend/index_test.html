<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Drivee Analytics Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f6f7f9;
}

/* layout */
.layout { display: flex; height: 100vh; }
.sidebar {
  width: 220px;
  background: white;
  padding: 20px;
  border-right: 1px solid #eee;
}
.logo span { color: #A3E635; }

.menu div {
  margin: 10px 0;
  cursor: pointer;
}
.menu .active { color: #A3E635; font-weight: bold; }

.main { flex: 1; display: flex; flex-direction: column; }

.topbar {
  height: 60px;
  display: flex;
  justify-content: space-between;
  padding: 10px 20px;
  background: white;
  border-bottom: 1px solid #eee;
}

.grid {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
}

.kpi {
  background: #f0fdf4;
  padding: 20px;
  border-radius: 12px;
}
.kpi-value { font-size: 28px; font-weight: bold; }

.chat-mini {
  max-height: 200px;
  overflow-y: auto;
  margin-bottom: 10px;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect, useRef } = React;
const API = "http://localhost:8000";

/* ---------- CHART ---------- */

function ChartOrKPI({ columns, rows }) {
  const ref = useRef();

  if (!rows || rows.length === 0) return <div>Нет данных</div>;

  if (columns.length === 1) {
    return <div className="kpi-value">{rows[0][0]}</div>;
  }

  useEffect(() => {
    const chart = new Chart(ref.current, {
      type: "bar",
      data: {
        labels: rows.map(r => r[0]),
        datasets: [{
          label: columns[1],
          data: rows.map(r => r[1]),
          backgroundColor: "#A3E635"
        }]
      }
    });
    return () => chart.destroy();
  }, [rows]);

  return <canvas ref={ref}></canvas>;
}

/* ---------- SIDEBAR ---------- */

function Sidebar({ page, setPage }) {
  return (
    <div className="sidebar">
      <div className="logo">driv<span>ee</span></div>

      <div className="menu">
        <div className={page==="dashboard"?"active":""} onClick={()=>setPage("dashboard")}>Главная</div>
        <div onClick={()=>setPage("orders")}>Заказы</div>
        <div onClick={()=>setPage("drivers")}>Водители</div>
        <div onClick={()=>setPage("analytics")}>Аналитика</div>
      </div>
    </div>
  );
}

/* ---------- TOPBAR ---------- */

function Topbar({ role, setRole }) {
  return (
    <div className="topbar">
      <input placeholder="Поиск..." />
      <div onClick={()=>setRole(role==="admin"?"manager":"admin")}>
        {role}
      </div>
    </div>
  );
}

/* ---------- DASHBOARD ---------- */

function Dashboard() {
  const [kpi, setKpi] = useState(null);

  useEffect(()=>{
    fetch(API+"/kpi")
      .then(r=>r.json())
      .then(setKpi);
  },[]);

  if (!kpi) return "Загрузка...";

  return (
    <>
      <div className="kpi">Заказы<div className="kpi-value">{kpi.orders}</div></div>
      <div className="kpi">Выполнено<div className="kpi-value">{kpi.done}</div></div>
      <div className="kpi">Отмены<div className="kpi-value">{kpi.cancel}</div></div>
    </>
  );
}

/* ---------- CHAT ANALYTICS ---------- */

function Analytics() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");

  const ask = async () => {
    const r = await fetch(API+"/query", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({question: input})
    });
    const data = await r.json();

    setMessages([
      ...messages,
      {
        q: input,
        explanation: data.explanation,
        columns: data.data?.columns,
        rows: data.data?.rows
      }
    ]);

    setInput("");
  };

  return (
    <div className="card">
      <h3>AI Аналитика</h3>

      <div className="chat-mini">
        {messages.map((m,i)=>(
          <div key={i}>
            <b>{m.q}</b>
            <div>{m.explanation}</div>
            <ChartOrKPI columns={m.columns} rows={m.rows}/>
          </div>
        ))}
      </div>

      <input value={input} onChange={e=>setInput(e.target.value)} />
      <button onClick={ask}>Спросить</button>
    </div>
  );
}

/* ---------- APP ---------- */

function App() {
  const [page, setPage] = useState("dashboard");
  const [role, setRole] = useState("admin");

  return (
    <div className="layout">
      <Sidebar page={page} setPage={setPage} />

      <div className="main">
        <Topbar role={role} setRole={setRole} />

        <div className="grid">
          {page==="dashboard" && <Dashboard />}
          {page==="analytics" && <Analytics />}
          {page==="orders" && <div className="card">Orders page (stub)</div>}
          {page==="drivers" && <div className="card">Drivers page (stub)</div>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
